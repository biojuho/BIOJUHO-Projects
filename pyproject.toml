[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-projects-workspace"
version = "1.0.0"
description = "Multi-project AI workspace: DeSci, AgriGuard, GetDayTrends, DailyNews"
requires-python = ">=3.12"
dependencies = [
    "python-dotenv",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["shared*", "content_intelligence*"]

[tool.ruff]
target-version = "py314"
line-length = 120

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
    "SIM",  # flake8-simplify
    "TCH",  # flake8-type-checking
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults (FastAPI Depends)
    "SIM108", # use ternary operator (sometimes less readable)
]

[tool.ruff.lint.isort]
known-first-party = ["shared", "getdaytrends", "content_intelligence"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "integration: marks tests that require external service integration",
    "external: marks tests that make real external API calls",
]
filterwarnings = [
    "ignore::DeprecationWarning",
]
