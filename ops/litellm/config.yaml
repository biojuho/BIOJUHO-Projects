# LiteLLM Proxy Configuration
# ---------------------------------------------------------------------------
# Phase 1 MVP — unified gateway for the 9 LLM backends used by this workspace.
# Default-OFF: only consumed when docker compose runs with --profile observability.
#
# Model alias scheme:
#   tier-heavy      → deep-analysis primary chain (Claude Opus → Sonnet → GPT)
#   tier-medium     → balanced default chain (Sonnet → Gemini → DeepSeek)
#   tier-lightweight→ cheap/fast chain (Haiku → Gemini Flash → Moonshot)
# Direct aliases (backend-name) preserved for explicit pinning by callers.
# ---------------------------------------------------------------------------

model_list:
  # ---------- Anthropic ----------
  - model_name: anthropic-opus
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: anthropic-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: anthropic-haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # ---------- OpenAI ----------
  - model_name: openai-gpt5
    litellm_params:
      model: openai/gpt-5.5
      api_key: os.environ/OPENAI_API_KEY

  - model_name: openai-gpt5-mini
    litellm_params:
      model: openai/gpt-5.4-mini
      api_key: os.environ/OPENAI_API_KEY

  # ---------- Google Gemini ----------
  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-3.0-pro
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.5-flash-lite
      api_key: os.environ/GEMINI_API_KEY

  # ---------- xAI Grok (OpenAI-compatible) ----------
  - model_name: grok-4
    litellm_params:
      model: openai/grok-4
      api_base: https://api.x.ai/v1
      api_key: os.environ/XAI_API_KEY

  # ---------- DeepSeek (OpenAI-compatible) ----------
  - model_name: deepseek-chat
    litellm_params:
      model: openai/deepseek-chat
      api_base: https://api.deepseek.com
      api_key: os.environ/DEEPSEEK_API_KEY

  # ---------- Moonshot (OpenAI-compatible) ----------
  - model_name: moonshot-v1
    litellm_params:
      model: openai/moonshot-v1-32k
      api_base: https://api.moonshot.cn/v1
      api_key: os.environ/MOONSHOT_API_KEY

  # ---------- Xiaomi MiMo (OpenAI-compatible) ----------
  - model_name: mimo
    litellm_params:
      model: openai/mimo-pro
      api_base: https://api.xiaomi.com/mimo/v1
      api_key: os.environ/XIAOMI_MIMO_API_KEY

  # ---------- Tier aliases (callers route by tier, proxy handles fallback) ----------
  - model_name: tier-heavy
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      fallbacks: ["anthropic-sonnet", "openai-gpt5", "gemini-pro"]

  - model_name: tier-medium
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      fallbacks: ["gemini-pro", "deepseek-chat", "openai-gpt5-mini"]

  - model_name: tier-lightweight
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      fallbacks: ["gemini-flash", "moonshot-v1", "openai-gpt5-mini"]

# ---------------------------------------------------------------------------
# Router behaviour
# ---------------------------------------------------------------------------
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 30
  retry_after: 5

# ---------------------------------------------------------------------------
# Observability — Langfuse callback (LiteLLM-native integration)
# Cost + latency + trace propagation is handled by LiteLLM itself.
# ---------------------------------------------------------------------------
litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  drop_params: true

# ---------------------------------------------------------------------------
# Proxy server
# ---------------------------------------------------------------------------
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/LITELLM_DATABASE_URL
  store_model_in_db: false
