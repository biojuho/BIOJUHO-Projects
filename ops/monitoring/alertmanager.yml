global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default
  routes:
    - matchers:
        - severity = critical
      receiver: discord-critical
      continue: true

receivers:
  - name: default
    webhook_configs: []

  - name: discord-critical
    discord_configs:
      # Discord Webhook URL. Please replace this with your actual Discord channel webhook.
      # You can supply this via environment variables if starting alertmanager with `--config.file` that supports env templating,
      # or by directly editing this file in your deployment pipeline.
      - webhook_url: 'https://discord.com/api/webhooks/000000000000000000/YOUR_DISCORD_WEBHOOK_TOKEN_HERE_REPLACE_ME'
        title: '🚨 {{ .GroupLabels.alertname }} ({{ .Status | toUpper }})'
        message: |-
          {{ range .Alerts }}
          **Service:** {{ .Labels.service }}
          **Severity:** {{ .Labels.severity }}
          **Summary:** {{ .Annotations.summary }}
          **Description:** {{ .Annotations.description }}
          {{ end }}

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ['alertname', 'service']
