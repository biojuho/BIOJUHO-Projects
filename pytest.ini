[pytest]
testpaths = tests
pythonpath = .
addopts = -m "not integration" --ignore=desci-platform/biolinker --ignore=tests2_out.txt --ignore=tests_out.txt --ignore=tests_out_ascii.txt --ignore-glob="**/manual/*" --ignore-glob="**/manual_*"
norecursedirs =
    .git
    .venv
    .pytest_cache
    .ruff_cache
    node_modules
    archive
    var
    .smoke-tmp
    .smoke-basetemp
    dist
    build
    output
markers =
    integration: tests requiring running local services, credentials, or live network access
    external: tests that call external APIs or internet resources
filterwarnings =
    ignore::PendingDeprecationWarning:multipart
    ignore::DeprecationWarning
    ignore:'asyncio.iscoroutinefunction' is deprecated:DeprecationWarning
    ignore:'HTTP_422_UNPROCESSABLE_ENTITY' is deprecated:DeprecationWarning
    ignore:websockets.legacy is deprecated:DeprecationWarning
    ignore:'_UnionGenericAlias' is deprecated:DeprecationWarning
    ignore:Core Pydantic V1 functionality isn't compatible with Python 3.14:UserWarning

[coverage:run]
source = getdaytrends,shared,tests
omit =
    */.venv/*
    */node_modules/*
    */tests/*
    */__pycache__/*
    **/manual/*

[coverage:report]
show_missing = true
skip_empty = true
fail_under = 50
exclude_lines =
    pragma: no cover
    if __name__ == .__main__
    raise NotImplementedError
    except ImportError
