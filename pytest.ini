[pytest]
pythonpath = .
addopts = -m "not integration" --ignore=desci-platform/biolinker
markers =
    integration: tests requiring running local services, credentials, or live network access
    external: tests that call external APIs or internet resources
filterwarnings =
    ignore::PendingDeprecationWarning:multipart
    ignore::DeprecationWarning
    ignore:'asyncio.iscoroutinefunction' is deprecated:DeprecationWarning
    ignore:'HTTP_422_UNPROCESSABLE_ENTITY' is deprecated:DeprecationWarning
    ignore:websockets.legacy is deprecated:DeprecationWarning
    ignore:'_UnionGenericAlias' is deprecated:DeprecationWarning
    ignore:Core Pydantic V1 functionality isn't compatible with Python 3.14:UserWarning
