name: Publish JooPark Pages

on:
  workflow_dispatch:
  push:
    branches:
      - codex/joopark-workspace-release
    paths:
      - ".github/workflows/joopark-pages.yml"
      - "index.html"
      - "app.js"
      - "styles.css"
      - "favicon.svg"
      - "README.md"
      - "data/**"
      - "vendor/**"
      - "scripts/package-release.mjs"
      - "scripts/verify-release.mjs"
      - "scripts/smoke-release.mjs"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Build release package
        run: node scripts/package-release.mjs

      - name: Verify release package
        run: node scripts/verify-release.mjs

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/release

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5
