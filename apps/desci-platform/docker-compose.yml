services:
  # --- Dev profile (default) ---
  biolinker:
    container_name: desci-biolinker
    build: ./biolinker
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - CHROMA_DB_PATH=/app/chroma_db
      - ENV=${ENV:-development}
      - VECTOR_STORE_BACKEND=${VECTOR_STORE_BACKEND:-chroma}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME:-rfp_notices}
      - QDRANT_TIMEOUT_SECONDS=${QDRANT_TIMEOUT_SECONDS:-10}
      - GROBID_ENABLED=${GROBID_ENABLED:-true}
      - GROBID_URL=${GROBID_URL:-http://grobid:8070/api}
      - GROBID_TIMEOUT_SECONDS=${GROBID_TIMEOUT_SECONDS:-60}
    volumes:
      - ./biolinker/chroma_db:/app/chroma_db
    depends_on:
      - chromadb
      - qdrant
      - grobid
    networks:
      - desci-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  chromadb:
    image: chromadb/chroma:latest
    expose:
      - "8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - desci-net

  qdrant:
    image: qdrant/qdrant:latest
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - desci-net

  grobid:
    image: lfoppiano/grobid:0.8.2-crf
    expose:
      - "8070"
      - "8071"
    networks:
      - desci-net

  # --- Production profile ---
  nginx:
    build:
      context: ../nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - biolinker
    networks:
      - desci-net
    restart: unless-stopped
    profiles:
      - prod

networks:
  desci-net:
    driver: bridge

volumes:
  chroma-data:
  qdrant-data:
