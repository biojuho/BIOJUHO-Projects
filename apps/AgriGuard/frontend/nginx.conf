server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets. nginx's default gzip only covers text/html, leaving
    # the JS/CSS/JSON/SVG bundle uncompressed; gzip_types extends it for ~60-70%
    # smaller transfers on the SPA bundle. gzip_vary adds Vary: Accept-Encoding
    # so caches keep compressed and identity copies apart.
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml application/manifest+json font/woff2;

    # Security headers — applied to all responses ('always' also covers errors).
    # Mirrors the desci-platform header set so both products launch hardened.
    # NOTE: nginx drops inherited add_header in any location that sets its own,
    # so the static-asset location below re-adds nosniff.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # OWASP Secure Headers additions. same-origin-allow-popups (not same-origin)
    # keeps Firebase/OAuth sign-in popups working while still isolating the
    # browsing context against XS-Leaks. X-Permitted-Cross-Domain-Policies:none
    # is legacy Flash/Silverlight hardening that security scanners still check.
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # SPA fallback: serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend service
    location /api/ {
        proxy_pass http://backend:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-add nosniff here: setting add_header in this location otherwise
        # drops the server-level security headers for static assets.
        add_header X-Content-Type-Options "nosniff" always;
    }
}
