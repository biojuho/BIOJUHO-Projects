[pytest]
testpaths = tests
pythonpath = .
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    integration: tests requiring running local services, credentials, or live network access
filterwarnings =
    ignore::PendingDeprecationWarning
    ignore::DeprecationWarning
    ignore:websockets.legacy is deprecated
    ignore:Core Pydantic V1 functionality isn't compatible with Python 3.14
