services:
  postgres:
    image: postgres:16-alpine
    container_name: agriguard-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agriguard
      POSTGRES_PASSWORD: agriguard_secret
      POSTGRES_DB: agriguard
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - agriguard-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agriguard -d agriguard"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - agriguard-net
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - agriguard-net
    restart: unless-stopped

  backend:
    container_name: agriguard-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - ENV=production
      - DATABASE_URL=postgresql://agriguard:agriguard_secret@postgres:5432/agriguard
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_BROKER_PORT=1883
    env_file:
      - ./backend/.env
    volumes:
      - backend-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - agriguard-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    container_name: agriguard-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - agriguard-net
    restart: unless-stopped

networks:
  agriguard-net:
    driver: bridge

volumes:
  backend-data:
  postgres-data:
