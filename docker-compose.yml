  #     - redis-data:/data
  #   networks:
  #     - ai-projects-network
  #   restart: unless-stopped

  # Qdrant Vector Database (for future migration)
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   container_name: ai-projects-qdrant
  #   ports:
  #     - "6333:6333"
  #     - "6334:6334"
  #   volumes:
  #     - qdrant-data:/qdrant/storage
  #   networks:
  #     - ai-projects-network
  #   restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  # redis-data:
  #   driver: local
  # qdrant-data:
  #   driver: local

networks:
  ai-projects-network:
    driver: bridge
