# AI Projects Workspace - Docker Compose Configuration
# Usage: docker compose up -d
# Services: PostgreSQL, Biolinker API, AgriGuard API, Frontend

services:
  # PostgreSQL Database (shared by multiple services)
  postgres:
    image: postgres:16-alpine
    container_name: ai-projects-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_projects}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./ops/scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ai-projects-network

  # DeSci Platform - Biolinker API
  biolinker:
    build:
      context: ./apps/desci-platform/biolinker
      dockerfile: Dockerfile
    container_name: biolinker-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/biolinker
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_APPLICATION_CREDENTIALS: /app/firebase-key.json
      ENV: ${ENV:-development}
    ports:
      - "8000:8000"
    volumes:
      - ./apps/desci-platform/biolinker:/app
      - ./packages/shared:/app/shared
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai-projects-network
    restart: unless-stopped

  # AgriGuard Backend API
  agriguard:
    build:
      context: ./apps/AgriGuard/backend
      dockerfile: Dockerfile
    container_name: agriguard-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/agriguard
      WEB3_PROVIDER_URI: ${WEB3_PROVIDER_URI}
      PRIVATE_KEY: ${AGRIGUARD_PRIVATE_KEY}
    ports:
      - "8002:8002"
    volumes:
      - ./apps/AgriGuard/backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai-projects-network
    restart: unless-stopped

  # DeSci Platform - Frontend
  frontend:
    build:
      context: ./apps/desci-platform/frontend
      dockerfile: Dockerfile
    container_name: desci-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
      VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
      VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
    ports:
      - "5173:5173"
    volumes:
      - ./apps/desci-platform/frontend:/app
      - /app/node_modules
    depends_on:
      - biolinker
    networks:
      - ai-projects-network
    restart: unless-stopped

  # getdaytrends - Automated Trend Analysis & Content Generation
  getdaytrends:
    build:
      context: .
      dockerfile: automation/getdaytrends/Dockerfile
    container_name: getdaytrends
    environment:
      # Storage
      STORAGE_TYPE: ${GETDAYTRENDS_STORAGE_TYPE:-notion}
      NOTION_TOKEN: ${NOTION_TOKEN}
      NOTION_DATABASE_ID: ${GETDAYTRENDS_NOTION_DATABASE_ID}
      # LLM API Keys (from shared)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Schedule
      SCHEDULE_INTERVAL_MINUTES: ${GETDAYTRENDS_SCHEDULE_INTERVAL:-240}
      DEFAULT_COUNTRY: ${GETDAYTRENDS_COUNTRY:-korea}
      DEFAULT_LIMIT: ${GETDAYTRENDS_LIMIT:-10}
      # Features
      ENABLE_CLUSTERING: ${GETDAYTRENDS_ENABLE_CLUSTERING:-true}
      ENABLE_LONG_FORM: ${GETDAYTRENDS_ENABLE_LONG_FORM:-true}
      MIN_VIRAL_SCORE: ${GETDAYTRENDS_MIN_VIRAL_SCORE:-60}
      LONG_FORM_MIN_SCORE: ${GETDAYTRENDS_LONG_FORM_MIN_SCORE:-95}
      # Alerts (optional)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      # Timezone
      TZ: Asia/Seoul
    volumes:
      - ./automation/getdaytrends/data:/app/getdaytrends/data
      - ./automation/getdaytrends/logs:/app/getdaytrends/logs
    networks:
      - ai-projects-network
    restart: unless-stopped
    # Override CMD to run scheduler mode instead of one-shot
    command: ["python", "main.py"]

  # Redis (for future caching)
  # redis:
  #   image: redis:7-alpine
  #   container_name: ai-projects-redis
  #   ports:
  #     - "6379:6379"
