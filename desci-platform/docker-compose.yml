services:
  # --- Dev profile (default) ---
  biolinker:
    container_name: desci-biolinker
    build: ./biolinker
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - CHROMA_DB_PATH=/app/chroma_db
      - ENV=${ENV:-development}
    volumes:
      - ./biolinker/chroma_db:/app/chroma_db
    depends_on:
      - chromadb
    networks:
      - desci-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  chromadb:
    image: chromadb/chroma:latest
    expose:
      - "8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - desci-net

  # --- Production profile ---
  nginx:
    build:
      context: ../nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - biolinker
    networks:
      - desci-net
    restart: unless-stopped
    profiles:
      - prod

networks:
  desci-net:
    driver: bridge

volumes:
  chroma-data:
