services:
  nginx:
    build:
      context: ../nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - biolinker
    networks:
      - desci-net
    restart: unless-stopped

  biolinker:
    container_name: desci-biolinker
    build: ./biolinker
    expose:
      - "8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CHROMA_DB_PATH=/app/chroma_db
    volumes:
      - ./biolinker/chroma_db:/app/chroma_db
    depends_on:
      - chromadb
    networks:
      - desci-net

  chromadb:
    image: chromadb/chroma:latest
    expose:
      - "8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - desci-net

networks:
  desci-net:
    driver: bridge

volumes:
  chroma-data:

