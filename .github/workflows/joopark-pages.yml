name: Publish JooPark Pages

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or ref that contains the JooPark workspace app."
        required: true
        default: codex/joopark-workspace-release
        type: string
  push:
    branches:
      - codex/joopark-workspace-release
    paths:
      - ".github/workflows/joopark-pages.yml"
      - "index.html"
      - "search-empty-state.js"
      - "home-execution-view.js"
      - "calendar-view.js"
      - "todo-view.js"
      - "notes-view.js"
      - "habits-view.js"
      - "stats-view.js"
      - "llm-wiki-view.js"
      - "portfolio-view.js"
      - "kanban-view.js"
      - "gantt-view.js"
      - "team-view.js"
      - "workspace-storage.js"
      - "dashboard-storage.js"
      - "dashboard-prioritization.js"
      - "dashboard-evidence-receipts.js"
      - "dashboard-insights-engine.js"
      - "dashboard-autoresearch-loop.js"
      - "dashboard-view.js"
      - "storage-status-view.js"
      - "settings-view.js"
      - "system-status-view.js"
      - "backup-import-guards.js"
      - "backup-import-ui.js"
      - "release-status.js"
      - "operations-copy-actions.js"
      - "verify-workspace-summary.js"
      - "dialog-shell.js"
      - "project-picker.js"
      - "global-search.js"
      - "command-palette.js"
      - "keyboard-shortcuts.js"
      - "interaction-setup.js"
      - "event-reminders.js"
      - "footer-clock.js"
      - "db-catalog.js"
      - "review-handoff.js"
      - "review-result-view.js"
      - "review-execution-checklist.js"
      - "review-issue-payload.js"
      - "review-result-state.js"
      - "review-result-draft-state.js"
      - "review-creation-actions.js"
      - "review-package-view.js"
      - "review-artifact-view.js"
      - "review-artifact-state.js"
      - "review-copy-actions.js"
      - "review-submission-copy.js"
      - "review-recommendation-export.js"
      - "pwa-runtime.js"
      - "app.js"
      - "sw.js"
      - "styles.css"
      - "favicon.svg"
      - "icons/**"
      - "site.webmanifest"
      - "social-preview.png"
      - "social-preview.svg"
      - "README.md"
      - "data/**"
      - "vendor/**"
      - "scripts/package-release.mjs"
      - "scripts/verify-release.mjs"
      - "scripts/smoke-release.mjs"

permissions:
  contents: read
  pages: write
  id-token: write
  attestations: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || 'codex/joopark-workspace-release' }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Generate release readiness summary cache
        run: |
          node scripts/audit-release-readiness.mjs --format=summary || audit_status=$?
          node -e "const fs = require('fs'); const p = 'autoresearch-results/release-readiness-summary.json'; const data = JSON.parse(fs.readFileSync(p, 'utf8')); if (data.schemaVersion !== 'joopark-release-readiness-summary/v1' || !data.generatedAt) process.exit(1);"
          echo "audit_status=${audit_status:-0}"

      - name: Build release package
        run: node scripts/package-release.mjs

      - name: Verify release package
        run: node scripts/verify-release.mjs

      - name: Attest release package
        uses: actions/attest@v4
        with:
          subject-path: dist/release/**

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/release

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
