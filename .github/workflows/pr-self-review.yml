name: PR Self-Review

on:
  pull_request:
    branches: ["main", "dev"]

jobs:
  self-review:
    name: Self-Review Checklist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: '3.13'

      - name: Generate self-review
        run: |
          python ops/scripts/pr_self_review.py --base origin/${{ github.base_ref }}

      - name: Post review as comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            let output;
            try {
              output = execSync(
                `python ops/scripts/pr_self_review.py --base origin/${{ github.base_ref }}`,
                { encoding: 'utf-8', timeout: 30000 }
              );
            } catch (e) {
              output = e.stdout || 'Review generation failed';
            }

            // Find existing bot comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(
              c => c.body.includes('PR 셀프 리뷰 체크리스트')
            );

            const body = output + '\n\n---\n*자동 생성 by `ops/scripts/pr_self_review.py`*';

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
