name: PR Self-Review

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: ["main", "dev"]

permissions:
  contents: read

jobs:
  self-review:
    name: Self-Review Checklist
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write # Required for github-script to create or update the self-review PR comment.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: '3.13'

      - name: Generate self-review
        # Script exits 1 on red findings, but the comment-post step below
        # already surfaces them on the PR. Treat this as informational so
        # long-running branches with accumulated shared/ touches aren't blocked.
        continue-on-error: true
        run: |
          python ops/scripts/pr_self_review.py --base origin/${GITHUB_BASE_REF}

      - name: Post review as comment
        if: always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          BASE_REF: ${{ github.base_ref }}
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const baseRef = process.env.BASE_REF;

            let output;
            try {
              output = execSync(
                `python ops/scripts/pr_self_review.py --base origin/${baseRef}`,
                { encoding: 'utf-8', timeout: 30000 }
              );
            } catch (e) {
              output = e.stdout || 'Review generation failed';
            }

            // Find existing bot comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(
              c => typeof c.body === 'string' && c.body.includes('PR self-review checklist')
            );

            const body = output + '\n\n---\n*Auto-generated by ops/scripts/pr_self_review.py*';

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
