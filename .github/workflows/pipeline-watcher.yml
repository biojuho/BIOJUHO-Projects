name: Pipeline Watcher (13h Check)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    # Run every 13 hours
    - cron: '0 */13 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-pipelines:
    environment: automation-ops
    name: Pipeline health check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Python & uv
        uses: ./.github/actions/setup-python-uv

      - name: Install dependencies
        run: uv pip install --system httpx pydantic anthropic notion-client aiosqlite sqlalchemy discord-webhook python-telegram-bot

      - name: Run pipeline health check run
        env:
          DATABASE_URL_AGRIGUARD: ${{ secrets.DATABASE_URL_AGRIGUARD }}
          DATABASE_URL_DAILYNEWS: ${{ secrets.DATABASE_URL_DAILYNEWS }}
          DATABASE_URL_GETDAYTRENDS: ${{ secrets.DATABASE_URL_GETDAYTRENDS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DISCORD_WEBHOOK_URL_OPS: ${{ secrets.DISCORD_WEBHOOK_URL_OPS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          uv run ops/scripts/healthcheck.py --webhook "$DISCORD_WEBHOOK_URL_OPS"
