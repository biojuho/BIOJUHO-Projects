name: Dashboard Release Refresh

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      node-version:
        description: Node.js version used to rebuild the dashboard bundle
        required: true
        default: "24.15.0"
      artifact-name:
        description: Name for the uploaded dashboard dist artifact
        required: true
        default: dashboard-dist-refresh

concurrency:
  group: dashboard-release-refresh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    name: Build dashboard release artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/dashboard

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ github.event.inputs['node-version'] }}
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci

      - name: Run dashboard tests
        run: npm test -- --run

      - name: Build dashboard release bundle
        run: npm run build

      - name: Check dashboard bundle budget
        run: npm run check:bundle

      - name: Upload dashboard dist artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: ${{ github.event.inputs['artifact-name'] }}
          path: apps/dashboard/dist
          if-no-files-found: error
          retention-days: 14
