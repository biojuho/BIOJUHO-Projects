name: Multi-Project CI/CD Pipeline

on:
  push:
    branches: ["main", "dev"]
    paths-ignore:
      - "apps/AgriGuard/**"   # agriguard-ci.yml ?꾨떞
  pull_request:
    branches: ["main", "dev"]
    paths-ignore:
      - "apps/AgriGuard/**"   # agriguard-ci.yml ?꾨떞

jobs:
  lint-python:
    name: Ruff Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install Ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  desci-backend:
    name: DeSci Backend Tests
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: apps/desci-platform/biolinker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: apps/desci-platform/biolinker/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        env:
          PYTHONIOENCODING: utf-8
          MOCK_MODE: "true"
          ALLOW_TEST_BYPASS: "true"
        run: pytest tests/ -v --tb=short

  desci-frontend:
    name: DeSci Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desci-platform/frontend
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desci-platform/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Test
        run: npm test -- --run

  desci-contracts:
    name: DeSci Smart Contract Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desci-platform/contracts
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desci-platform/contracts/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Compile contracts
        run: npx hardhat compile
      - name: Run tests
        run: npx hardhat test




