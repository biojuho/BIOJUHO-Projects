name: JooPark Product CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex/joopark-workspace-release

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package.json

      - name: Run unit tests
        run: npm run test:unit

      - name: Run syntax lint
        run: npm run lint

      - name: Run structure guard
        run: npm run check:structure

      - name: Check architecture docs
        run: npm run check:docs

      - name: Run XSS audit
        run: npm run audit:xss

      - name: Check vendored OSS
        run: npm run check:vendor

      - name: Measure large-data performance
        run: npm run measure:perf

  browser-smoke:
    name: Browser smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package.json

      - name: Locate Chrome
        shell: bash
        run: |
          CHROME_BIN="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          if [ -z "$CHROME_BIN" ]; then
            echo "Chrome or Chromium executable was not found on the runner." >&2
            exit 1
          fi
          echo "CHROME_PATH=$CHROME_BIN" >> "$GITHUB_ENV"
          "$CHROME_BIN" --version

      - name: Run source browser smoke
        run: npm run verify:product

  release-smoke:
    name: Release smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package.json

      - name: Locate Chrome
        shell: bash
        run: |
          CHROME_BIN="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          if [ -z "$CHROME_BIN" ]; then
            echo "Chrome or Chromium executable was not found on the runner." >&2
            exit 1
          fi
          echo "CHROME_PATH=$CHROME_BIN" >> "$GITHUB_ENV"
          "$CHROME_BIN" --version

      - name: Run packaged release smoke
        run: npm run test:product
