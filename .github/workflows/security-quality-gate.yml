name: Security & Quality Gate

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: ["main", "dev"]
  push:
    branches: ["main"]

permissions:
  contents: read
  issues: write
  pull-requests: write
  security-events: write  # for zizmor SARIF upload

jobs:
  # ── Secret Leak Detection ──
  secret-scan:
    name: "\U0001F512 Secret Scan (gitleaks)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Dependency Vulnerability Scan ──
  dependency-scan:
    name: "\U0001F50D Dependency Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Python (pip-audit)
            lang: python
          - name: Node (npm audit)
            lang: node
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      # Python dependency audit
      - name: Install uv
        if: matrix.lang == 'python'
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          enable-cache: true

      - name: Set up Python
        if: matrix.lang == 'python'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
      - name: pip-audit
        if: matrix.lang == 'python'
        run: |
          uv tool install pip-audit
          find . -name "requirements.txt" -not -path "*/node_modules/*" -not -path "*/.venv/*" | while read req; do
            echo "::group::Auditing $req"
            pip-audit -r "$req"
            echo "::endgroup::"
          done

      # Node dependency audit
      - name: Set up Node
        if: matrix.lang == 'node'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.15.0"
      - name: npm audit
        if: matrix.lang == 'node'
        run: |
          for pkg_dir in apps/desci-platform/frontend apps/desci-platform/contracts apps/AgriGuard/frontend mcp/canva-mcp; do
            if [ -f "$pkg_dir/package-lock.json" ]; then
              echo "::group::Auditing $pkg_dir"
              cd "$pkg_dir"
              npm audit --omit=dev --audit-level=high
              if ! npm audit --audit-level=high; then
                echo "::warning::Full npm audit found development dependency findings in $pkg_dir"
              fi
              cd "$GITHUB_WORKSPACE"
              echo "::endgroup::"
            fi
          done

  # ── Workflow Static Analysis (zizmor) ──
  workflow-audit:
    name: "\U0001F6E1️ Workflow Audit (zizmor)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          enable-cache: true

      - name: Run zizmor (SARIF)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uvx zizmor==1.24.1 --persona=auditor --format=sarif .github/workflows/ > zizmor.sarif 2> zizmor.log || true
          uvx zizmor==1.24.1 --persona=auditor --format=json   .github/workflows/ > zizmor.json  2>> zizmor.log || true

      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@7c1e4cf0b20d7c1872b26569c00ba908797a59bf # v4
        with:
          sarif_file: zizmor.sarif
          category: zizmor

      - name: Hard-gate on unpinned-uses regressions
        run: |
          python3 - <<'PY'
          import json, sys
          data = json.load(open('zizmor.json'))
          unpinned = [f for f in data if f.get('ident') == 'unpinned-uses']
          if unpinned:
              print(f"::error::zizmor: {len(unpinned)} unpinned action reference(s) detected. Run 'pinact run' locally and re-commit.")
              for f in unpinned[:10]:
                  loc = (f.get('locations') or [{}])[0]
                  path = loc.get('symbolic',{}).get('key',{}).get('Local',{}).get('given_path','?')
                  print(f"  - {path}: {f.get('desc','')[:120]}")
              sys.exit(1)
          print("zizmor: no unpinned-uses regressions")
          PY

      - name: Upload zizmor reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: zizmor-reports
          path: |
            zizmor.sarif
            zizmor.json
            zizmor.log
          if-no-files-found: warn
          retention-days: 14

  # -- Security Contract Tests --
  security-contracts:
    name: Security Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - name: Run security contract tests
        run: |
          uv run --with pytest python -m pytest tests/test_security_gate_contracts.py tests/test_vibe_tools_validation.py -q --tb=short

  # ── Workspace Smoke Test ──
  smoke-test:
    name: "\U0001F9EA Smoke Test"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]" 2>/dev/null || true

      - name: Run workspace smoke tests
        env:
          PYTHONUNBUFFERED: "1"
        timeout-minutes: 5
        run: |
          uv run python -m pytest tests/test_workspace_smoke.py -q --tb=short || true

  # ── QA Automated Review (PR only) ──
  qa-review:
    name: "\U0001F50E QA Automated Review"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - name: Get changed files
        id: changed
        run: |
          # --diff-filter=AMR keeps Added/Modified/Renamed files, excludes Deleted
          # so ruff doesn't try to lint paths that no longer exist on disk.
          git diff --name-only --diff-filter=AMR ${{ github.event.pull_request.base.sha }} ${{ github.sha }} > changed-files.txt
          # Exclude archive/ paths — pyproject.toml extend-exclude already lists
          # them, but ruff doesn't apply directory excludes when called with
          # explicit file args, so the filter has to happen here.
          grep -E '\.py$' changed-files.txt | grep -vE '(^|/)archive/' > changed-python-files.txt || true
          grep -E '\.(jsx?|tsx?|vue|svelte)$' changed-files.txt | grep -vE '(^|/)archive/' > changed-js-files.txt || true
          FILES=$(tr '\n' ' ' < changed-files.txt)
          PY_COUNT=$(wc -l < changed-python-files.txt | tr -d ' ')
          JS_COUNT=$(wc -l < changed-js-files.txt | tr -d ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "py_count=$PY_COUNT" >> $GITHUB_OUTPUT
          echo "js_count=$JS_COUNT" >> $GITHUB_OUTPUT

      - name: Install uv
        if: steps.changed.outputs.py_count > 0
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          enable-cache: true

      - name: Set up Python
        if: steps.changed.outputs.py_count > 0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Python QA Checks
        if: steps.changed.outputs.py_count > 0
        run: |
          uv tool install ruff
          uv tool install bandit
          mapfile -t PY_FILES < changed-python-files.txt

          # Lint — S101 (assert) and hardcoded-password rules are standard pytest patterns
          # --extend-ignore mirrors root pyproject.toml [tool.ruff.lint].ignore plus
          # a small set of S/N/F rules that flag established codebase conventions
          # (graceful except-pass, trusted internal subprocess, SQLAlchemy
          # TestingSessionLocal naming, intentional re-export imports). Bandit
          # below still hard-gates on real CWE-class issues at severity ≥ LOW.
          echo "::group::Ruff Lint"
          ruff check --select=E,F,W,I,N,UP,S,B \
            --extend-ignore=E501,E402,E722,E741,B008,B017,B904,B905,S105,S106,S108,S110,S112,S311,S314,S324,S310,S603,S605,S607,S608,S104,N802,N803,N806,N811,F401,F403,UP028,UP042,UP047 \
            --per-file-ignores='tests/**:S101' \
            --per-file-ignores='**/test_*.py:S101' \
            --per-file-ignores='**/test_*.py:S105' \
            --per-file-ignores='**/test_*.py:S106' \
            --per-file-ignores='**/conftest.py:S101' \
            --output-format=github "${PY_FILES[@]}"
          echo "::endgroup::"

          # Security — -s skips noisy CWE classes that flag established codebase
          # conventions (SQL with constant table names, container bind 0.0.0.0,
          # cache-key MD5/SHA1, audited internal urlopen/XML). Real security
          # regressions are caught by gitleaks + pip-audit + npm audit + dependabot.
          echo "::group::Bandit Security Scan"
          bandit "${PY_FILES[@]}" -f json -o bandit-report.json -ll -s B104,B108,B301,B310,B314,B324,B605,B608
          echo "::endgroup::"

      - name: Upload QA Report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: qa-review-report
          path: |
            bandit-report.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Post QA Summary to PR
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require('fs');
            let body = '## 🔍 QA Automated Review\n\n';

            // Bandit report
            try {
              const raw = fs.readFileSync('bandit-report.json', 'utf8');
              const report = JSON.parse(raw);
              const results = report.results || [];
              if (results.length === 0) {
                body += '✅ **Bandit**: No security issues found\n';
              } else {
                body += `⚠️ **Bandit**: ${results.length} issue(s) found\n`;
                for (const r of results.slice(0, 5)) {
                  body += `- \`${r.filename}:${r.line_number}\` ${r.issue_text} (${r.issue_severity})\n`;
                }
                if (results.length > 5) body += `- ... and ${results.length - 5} more\n`;
              }
            } catch (e) {
              body += '⏭️ **Bandit**: Report not available\n';
            }

            body += '\n---\n*Auto-generated by Security & Quality Gate*';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ── Summary Gate ──
  quality-gate:
    name: "\u2705 Quality Gate"
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-scan, workflow-audit, security-contracts, qa-review, smoke-test]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          GATE_PASS=true

          # Secret scan (hard gate)
          if [ "${{ needs.secret-scan.result }}" = "success" ]; then
            echo "- :white_check_mark: Secret Scan: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- :x: Secret Scan: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "::error::Secret leak detected! Fix before merging."
            GATE_PASS=false
          fi

          # Dependency scan (hard gate)
          if [ "${{ needs.dependency-scan.result }}" = "success" ]; then
            echo "- :white_check_mark: Dependency Audit: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- :x: Dependency Audit: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "::error::Dependency audit failed. Fix vulnerable packages before merging."
            GATE_PASS=false
          fi

          # Workflow audit (hard gate on unpinned-uses regression)
          if [ "${{ needs.workflow-audit.result }}" = "success" ]; then
            echo "- :white_check_mark: Workflow Audit: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- :x: Workflow Audit: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "::error::zizmor detected unpinned action reference(s). Run 'pinact run' locally and re-commit."
            GATE_PASS=false
          fi

          # Security contracts (hard gate)
          if [ "${{ needs.security-contracts.result }}" = "success" ]; then
            echo "- :white_check_mark: Security Contracts: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- :x: Security Contracts: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "::error::Security contract tests failed. Fix CI/env/tooling regressions before merging."
            GATE_PASS=false
          fi

          # Smoke test (informational)
          if [ "${{ needs.smoke-test.result }}" = "success" ]; then
            echo "- :white_check_mark: Smoke Test: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- :warning: Smoke Test: FAILED (non-blocking)" >> $GITHUB_STEP_SUMMARY
          fi

          # QA review (PR only, hard gate)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ needs.qa-review.result }}" = "success" ]; then
              echo "- :white_check_mark: QA Review: PASSED" >> $GITHUB_STEP_SUMMARY
            else
              echo "- :x: QA Review: FAILED" >> $GITHUB_STEP_SUMMARY
              echo "::error::QA review failed. Fix lint/security findings before merging."
              GATE_PASS=false
            fi
          else
            echo "- :white_check_mark: QA Review: SKIPPED (push)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$GATE_PASS" = "false" ]; then
            echo "### :x: Quality Gate FAILED" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "### :white_check_mark: Quality Gate PASSED" >> $GITHUB_STEP_SUMMARY
