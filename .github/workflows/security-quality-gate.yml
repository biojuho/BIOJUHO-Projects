name: Security & Quality Gate

on:
  pull_request:
    branches: ["main", "dev"]
  push:
    branches: ["main"]

jobs:
  # ── Secret Leak Detection ──
  secret-scan:
    name: "\U0001F512 Secret Scan (gitleaks)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Dependency Vulnerability Scan ──
  dependency-scan:
    name: "\U0001F50D Dependency Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Python (pip-audit)
            lang: python
          - name: Node (npm audit)
            lang: node
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      # Python dependency audit
      - name: Install uv
        if: matrix.lang == 'python'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        if: matrix.lang == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: pip-audit
        if: matrix.lang == 'python'
        run: |
          uv tool install pip-audit
          find . -name "requirements.txt" -not -path "*/node_modules/*" -not -path "*/.venv/*" | while read req; do
            echo "::group::Auditing $req"
            pip-audit -r "$req"
            echo "::endgroup::"
          done

      # Node dependency audit
      - name: Set up Node
        if: matrix.lang == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: npm audit
        if: matrix.lang == 'node'
        run: |
          for pkg_dir in apps/desci-platform/frontend apps/desci-platform/contracts apps/AgriGuard/frontend mcp/canva-mcp; do
            if [ -f "$pkg_dir/package-lock.json" ]; then
              echo "::group::Auditing $pkg_dir"
              cd "$pkg_dir"
              npm audit --audit-level=high
              cd "$GITHUB_WORKSPACE"
              echo "::endgroup::"
            fi
          done

  # -- Security Contract Tests --
  security-contracts:
    name: Security Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - name: Run security contract tests
        run: |
          uv run --with pytest python -m pytest tests/test_security_gate_contracts.py tests/test_vibe_tools_validation.py -q --tb=short

  # ── Workspace Smoke Test ──
  smoke-test:
    name: "\U0001F9EA Smoke Test"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]" 2>/dev/null || true

      - name: Run workspace smoke tests
        run: |
          uv run python -m pytest tests/test_workspace_smoke.py -q --tb=short --timeout=120 || true

  # ── QA Automated Review (PR only) ──
  qa-review:
    name: "\U0001F50E QA Automated Review"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          PY_COUNT=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep -c '\.py$' || true)
          JS_COUNT=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep -cE '\.(jsx?|tsx?|vue|svelte)$' || true)
          echo "py_count=$PY_COUNT" >> $GITHUB_OUTPUT
          echo "js_count=$JS_COUNT" >> $GITHUB_OUTPUT

      - name: Install uv
        if: steps.changed.outputs.py_count > 0
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        if: steps.changed.outputs.py_count > 0
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Python QA Checks
        if: steps.changed.outputs.py_count > 0
        run: |
          uv tool install ruff
          uv tool install bandit

          # Lint
          echo "::group::Ruff Lint"
          ruff check --select=E,F,W,I,N,UP,S,B --output-format=github .
          echo "::endgroup::"

          # Security
          echo "::group::Bandit Security Scan"
          bandit -r . -f json -o bandit-report.json --exclude ./.venv,./node_modules -ll
          echo "::endgroup::"

      - name: Upload QA Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-review-report
          path: |
            bandit-report.json
          if-no-files-found: ignore
          retention-days: 14

  # ── Summary Gate ──
  quality-gate:
    name: "\u2705 Quality Gate"
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-scan, security-contracts, qa-review, smoke-test]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          GATE_PASS=true

          # Secret scan (hard gate)
          if [ "${{ needs.secret-scan.result }}" = "success" ]; then
            echo "- :white_check_mark: Secret Scan: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- :x: Secret Scan: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "::error::Secret leak detected! Fix before merging."
            GATE_PASS=false
          fi

          # Dependency scan (hard gate)
          if [ "${{ needs.dependency-scan.result }}" = "success" ]; then
            echo "- :white_check_mark: Dependency Audit: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- :x: Dependency Audit: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "::error::Dependency audit failed. Fix vulnerable packages before merging."
            GATE_PASS=false
          fi

          # Security contracts (hard gate)
          if [ "${{ needs.security-contracts.result }}" = "success" ]; then
            echo "- :white_check_mark: Security Contracts: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- :x: Security Contracts: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "::error::Security contract tests failed. Fix CI/env/tooling regressions before merging."
            GATE_PASS=false
          fi

          # Smoke test (informational)
          if [ "${{ needs.smoke-test.result }}" = "success" ]; then
            echo "- :white_check_mark: Smoke Test: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- :warning: Smoke Test: FAILED (non-blocking)" >> $GITHUB_STEP_SUMMARY
          fi

          # QA review (PR only, hard gate)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ needs.qa-review.result }}" = "success" ]; then
              echo "- :white_check_mark: QA Review: PASSED" >> $GITHUB_STEP_SUMMARY
            else
              echo "- :x: QA Review: FAILED" >> $GITHUB_STEP_SUMMARY
              echo "::error::QA review failed. Fix lint/security findings before merging."
              GATE_PASS=false
            fi
          else
            echo "- :white_check_mark: QA Review: SKIPPED (push)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$GATE_PASS" = "false" ]; then
            echo "### :x: Quality Gate FAILED" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "### :white_check_mark: Quality Gate PASSED" >> $GITHUB_STEP_SUMMARY
