name: Security & Quality Gate

on:
  pull_request:
    branches: ["main", "dev"]
  push:
    branches: ["main"]

jobs:
  # ── Secret Leak Detection ──
  secret-scan:
    name: "\U0001F512 Secret Scan (gitleaks)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Dependency Vulnerability Scan ──
  dependency-scan:
    name: "\U0001F50D Dependency Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Python (pip-audit)
            lang: python
          - name: Node (npm audit)
            lang: node
    steps:
      - uses: actions/checkout@v6

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      # Python dependency audit
      - name: Install uv
        if: matrix.lang == 'python'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        if: matrix.lang == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: pip-audit
        if: matrix.lang == 'python'
        run: |
          uv tool install pip-audit
          find . -name "requirements.txt" -not -path "*/node_modules/*" -not -path "*/.venv/*" | while read req; do
            echo "::group::Auditing $req"
            pip-audit -r "$req"
            echo "::endgroup::"
          done

      # Node dependency audit
      - name: Set up Node
        if: matrix.lang == 'node'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: npm audit
        if: matrix.lang == 'node'
        run: |
          for pkg_dir in apps/desci-platform/frontend apps/desci-platform/contracts apps/AgriGuard/frontend mcp/canva-mcp; do
            if [ -f "$pkg_dir/package-lock.json" ]; then
              echo "::group::Auditing $pkg_dir"
              cd "$pkg_dir"
              npm audit --audit-level=high
              cd "$GITHUB_WORKSPACE"
              echo "::endgroup::"
            fi
          done

  # -- Security Contract Tests --
  security-contracts:
    name: Security Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - name: Run security contract tests
        run: |
          uv run --with pytest --with sqlalchemy --with pydantic python -m pytest tests/test_security_gate_contracts.py tests/test_vibe_tools_validation.py -q --tb=short

  # ── Workspace Smoke Test ──
  smoke-test:
    name: "\U0001F9EA Smoke Test"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]" 2>/dev/null || true

      - name: Run workspace smoke tests
        env:
          PYTHONUNBUFFERED: "1"
        timeout-minutes: 5
        run: |
          uv run python -m pytest tests/test_workspace_smoke.py -q --tb=short || true

  # ── QA Automated Review (PR only) ──
  qa-review:
    name: "\U0001F50E QA Automated Review"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | tr '\n' ' ')
          PY_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- '*.py' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "py_files=$PY_FILES" >> $GITHUB_OUTPUT
          PY_COUNT=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep -c '\.py$' || true)
          JS_COUNT=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep -cE '\.(jsx?|tsx?|vue|svelte)$' || true)
          echo "py_count=$PY_COUNT" >> $GITHUB_OUTPUT
          echo "js_count=$JS_COUNT" >> $GITHUB_OUTPUT

      - name: Install uv
        if: steps.changed.outputs.py_count > 0
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        if: steps.changed.outputs.py_count > 0
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Python QA Checks
        if: steps.changed.outputs.py_count > 0
        run: |
          uv tool install ruff
          uv tool install bandit
          PY_FILES="${{ steps.changed.outputs.py_files }}"
          export BASE_SHA="${{ github.event.pull_request.base.sha }}"
          export HEAD_SHA="${{ github.sha }}"

          # Lint
          echo "::group::Ruff Lint"
          set +e
          ruff check --select=E,F,W,I,N,UP,S,B --output-format=json $PY_FILES > ruff-report.json
          set -e
          echo "::endgroup::"

          # Security
          echo "::group::Bandit Security Scan"
          set +e
          bandit -f json -o bandit-report.json -ll $PY_FILES
          set -e
          echo "::endgroup::"

          python - <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys
          from pathlib import Path

          base = os.environ["BASE_SHA"]
          head = os.environ["HEAD_SHA"]
          root = Path.cwd()

          def normalize(path: str) -> str:
              candidate = Path(path)
              if candidate.is_absolute():
                  try:
                      candidate = candidate.relative_to(root)
                  except ValueError:
                      pass
              return candidate.as_posix()

          def added_line_map() -> dict[str, set[int]]:
              proc = subprocess.run(
                  ["git", "diff", "--unified=0", base, head, "--", "*.py"],
                  check=True,
                  capture_output=True,
                  text=True,
                  encoding="utf-8",
              )
              added: dict[str, set[int]] = {}
              current_file = ""
              next_line: int | None = None
              for line in proc.stdout.splitlines():
                  if line.startswith("+++ b/"):
                      current_file = line[6:]
                      added.setdefault(current_file, set())
                      next_line = None
                      continue
                  if line.startswith("@@ "):
                      match = re.search(r"\+(\d+)(?:,(\d+))?", line)
                      next_line = int(match.group(1)) if match else None
                      continue
                  if not current_file or next_line is None:
                      continue
                  if line.startswith("+") and not line.startswith("+++"):
                      added[current_file].add(next_line)
                      next_line += 1
                  elif line.startswith("-") and not line.startswith("---"):
                      continue
                  else:
                      next_line += 1
              return added

          def annotation(message: str) -> str:
              return message.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")

          added = added_line_map()
          failures = 0

          try:
              ruff_items = json.loads(Path("ruff-report.json").read_text(encoding="utf-8") or "[]")
          except Exception:
              ruff_items = []
          for item in ruff_items:
              path = normalize(item.get("filename", ""))
              row = int(item.get("location", {}).get("row", 0) or 0)
              if row in added.get(path, set()):
                  failures += 1
                  code = item.get("code") or "ruff"
                  message = annotation(item.get("message", "Ruff finding"))
                  print(f"::error file={path},line={row},title=ruff ({code})::{message}")

          try:
              bandit_items = json.loads(Path("bandit-report.json").read_text(encoding="utf-8") or "{}").get("results", [])
          except Exception:
              bandit_items = []
          for item in bandit_items:
              path = normalize(item.get("filename", ""))
              row = int(item.get("line_number", 0) or 0)
              if row in added.get(path, set()):
                  failures += 1
                  test_id = item.get("test_id") or "bandit"
                  message = annotation(item.get("issue_text", "Bandit finding"))
                  print(f"::error file={path},line={row},title=bandit ({test_id})::{message}")

          if failures:
              print(f"::error::{failures} QA finding(s) on added lines")
              sys.exit(1)
          print("No Ruff/Bandit findings on added lines.")
          PY

      - name: Upload QA Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: qa-review-report
          path: |
            ruff-report.json
            bandit-report.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Post QA Summary to PR
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let body = '## 🔍 QA Automated Review\n\n';

            // Bandit report
            try {
              const raw = fs.readFileSync('bandit-report.json', 'utf8');
              const report = JSON.parse(raw);
              const results = report.results || [];
              if (results.length === 0) {
                body += '✅ **Bandit**: No security issues found\n';
              } else {
                body += `⚠️ **Bandit**: ${results.length} issue(s) found\n`;
                for (const r of results.slice(0, 5)) {
                  body += `- \`${r.filename}:${r.line_number}\` ${r.issue_text} (${r.issue_severity})\n`;
                }
                if (results.length > 5) body += `- ... and ${results.length - 5} more\n`;
              }
            } catch (e) {
              body += '⏭️ **Bandit**: Report not available\n';
            }

            body += '\n---\n*Auto-generated by Security & Quality Gate*';

            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } catch (e) {
              core.warning(`Could not post QA summary: ${e.message}`);
            }

  # ── Summary Gate ──
  quality-gate:
    name: "\u2705 Quality Gate"
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-scan, security-contracts, qa-review, smoke-test]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          GATE_PASS=true

          # Secret scan (hard gate)
          if [ "${{ needs.secret-scan.result }}" = "success" ]; then
            echo "- :white_check_mark: Secret Scan: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- :x: Secret Scan: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "::error::Secret leak detected! Fix before merging."
            GATE_PASS=false
          fi

          # Dependency scan (hard gate)
          if [ "${{ needs.dependency-scan.result }}" = "success" ]; then
            echo "- :white_check_mark: Dependency Audit: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- :x: Dependency Audit: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "::error::Dependency audit failed. Fix vulnerable packages before merging."
            GATE_PASS=false
          fi

          # Security contracts (hard gate)
          if [ "${{ needs.security-contracts.result }}" = "success" ]; then
            echo "- :white_check_mark: Security Contracts: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- :x: Security Contracts: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "::error::Security contract tests failed. Fix CI/env/tooling regressions before merging."
            GATE_PASS=false
          fi

          # Smoke test (informational)
          if [ "${{ needs.smoke-test.result }}" = "success" ]; then
            echo "- :white_check_mark: Smoke Test: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- :warning: Smoke Test: FAILED (non-blocking)" >> $GITHUB_STEP_SUMMARY
          fi

          # QA review (PR only, hard gate)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ needs.qa-review.result }}" = "success" ]; then
              echo "- :white_check_mark: QA Review: PASSED" >> $GITHUB_STEP_SUMMARY
            else
              echo "- :x: QA Review: FAILED" >> $GITHUB_STEP_SUMMARY
              echo "::error::QA review failed. Fix lint/security findings before merging."
              GATE_PASS=false
            fi
          else
            echo "- :white_check_mark: QA Review: SKIPPED (push)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$GATE_PASS" = "false" ]; then
            echo "### :x: Quality Gate FAILED" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "### :white_check_mark: Quality Gate PASSED" >> $GITHUB_STEP_SUMMARY
