name: DailyNews Pipeline

on:
  schedule:
    - cron: "0 22 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force run outside schedule window"
        required: false
        type: boolean
        default: false
      max_items:
        description: "Max articles per category"
        required: false
        default: "5"

jobs:
  run-dailynews:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # ── Database ──
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # ── LLM keys ──
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
      GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY != '' && secrets.GEMINI_API_KEY || secrets.GOOGLE_API_KEY }}
      OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
      # ── Notification ──
      TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      # ── Notion (DailyNews-dedicated integration + reports DB) ──
      NOTION_API_KEY:              ${{ secrets.DAILYNEWS_NOTION_TOKEN }}
      NOTION_TASKS_DATABASE_ID:    ${{ secrets.DAILYNEWS_NOTION_REPORTS_DB_ID }}
      NOTION_REPORTS_DATABASE_ID:  ${{ secrets.DAILYNEWS_NOTION_REPORTS_DB_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          uv sync --package DailyNews
          uv pip install -e . --no-deps

      - name: Run DailyNews pipeline
        working-directory: automation/DailyNews
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/automation/DailyNews/src
        run: |
          FLAGS="--max-items ${{ github.event.inputs.max_items || '5' }}"
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FLAGS="$FLAGS --force"
          fi
          # Do NOT pipe through `head` — once head closes the pipe, Python
          # gets SIGPIPE and dies mid-run, which silently hides category
          # failures. The structured log file under logs/ is uploaded as
          # an artifact so full output is still available.
          set -o pipefail
          uv run python -u scripts/run_daily_news.py $FLAGS 2>&1

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dailynews-log-${{ github.run_number }}
          path: |
            automation/DailyNews/logs/
            automation/DailyNews/run_output*.log
          retention-days: 7

      - name: Cleanup .env
        if: always()
        working-directory: automation/DailyNews
        run: rm -f .env

      - name: Discord notification on failure
        if: failure() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\":\"🔴 DailyNews #${{ github.run_number }} failed\\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$DISCORD_WEBHOOK_URL" || true

      - name: Telegram notification on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"🔴 DailyNews #${{ github.run_number }} failed\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true
          fi

      - name: Telegram heartbeat on success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"✅ DailyNews #${{ github.run_number }} completed at $(date -u +%FT%TZ)\nMode: ${{ github.event.inputs.mode || 'full' }}\"}" || true
          fi
