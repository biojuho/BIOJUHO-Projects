name: AgriGuard CI

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "apps/AgriGuard/**"
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "apps/AgriGuard/**"

jobs:
  backend-test:
    name: Backend (Python 3.13)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/AgriGuard/backend

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx ruff

      - name: Lint with ruff
        run: |
          ruff check . --select=E,F,W --ignore=E501

      - name: Run tests
        env:
          PYTHONIOENCODING: utf-8
          ALLOW_TEST_BYPASS: "true"
        run: |
          pytest tests -q --tb=short

  frontend-test:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/AgriGuard/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/AgriGuard/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: npx vitest run --passWithNoTests

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - name: Build backend image
        run: docker build -t agriguard-backend ./apps/AgriGuard/backend

      - name: Build frontend image
        run: docker build -t agriguard-frontend ./apps/AgriGuard/frontend
