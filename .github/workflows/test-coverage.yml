name: Test Coverage Report

on:
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "getdaytrends/**"
      - "shared/**"
      - "tests/**"
      - "pytest.ini"
  push:
    branches: ["main"]
    paths:
      - "getdaytrends/**"
      - "shared/**"
      - "tests/**"

jobs:
  coverage:
    name: 📊 Python Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: getdaytrends/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r getdaytrends/requirements.txt
          pip install pytest-cov

      - name: Run tests with coverage
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          pytest --cov=getdaytrends --cov=shared --cov-report=xml:coverage.xml --cov-report=html:coverage-html --cov-report=term-missing -v --tb=short

      - name: Coverage Summary
        if: always()
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          import os

          tree = ET.parse("coverage.xml")
          root = tree.getroot()
          rate = float(root.attrib.get("line-rate", 0)) * 100

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
          with open(summary_path, "a") as f:
              emoji = "✅" if rate >= 60 else "⚠️" if rate >= 40 else "❌"
              f.write(f"### {emoji} Test Coverage: {rate:.1f}%\n")
              f.write(f"- Target: 60%\n")
              f.write(f"- Current: {rate:.1f}%\n\n")
          PY

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage-html/
          retention-days: 14
