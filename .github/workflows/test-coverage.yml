name: Test Coverage Report

on:
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "automation/getdaytrends/**"
      - "packages/shared/**"
      - "tests/**"
      - "pytest.ini"
  push:
    branches: ["main"]
    paths:
      - "automation/getdaytrends/**"
      - "packages/shared/**"
      - "tests/**"
      - ".github/workflows/test-coverage.yml"
  workflow_dispatch: {}

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          uv sync --all-packages
          uv pip install pytest-cov

      - name: Run tests with coverage
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          cd automation/getdaytrends
          uv run pytest \
            -c pytest.ini \
            --cov=. \
            --cov-report=xml:../../coverage.xml \
            --cov-report=html:../../coverage-html \
            --cov-report=term-missing \
            -v --tb=short


      - name: Coverage summary
        if: always()
        run: |
          uv run python - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report = Path("coverage.xml")
          if not report.exists():
              raise SystemExit(0)

          root = ET.parse(report).getroot()
          rate = float(root.attrib.get("line-rate", 0)) * 100
          label = "PASS" if rate >= 60 else "WARN" if rate >= 40 else "FAIL"

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary_path.open("a", encoding="utf-8") as handle:
              handle.write(f"### {label} Test Coverage: {rate:.1f}%\n")
              handle.write("- Target: 60%\n")
              handle.write(f"- Current: {rate:.1f}%\n")
          PY

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage-html/
          retention-days: 14
