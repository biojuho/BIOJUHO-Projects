name: Scheduler Heartbeat Monitor

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  heartbeat-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - name: Check GetDayTrends last run
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "getdaytrends.yml",
              per_page: 6,
              status: "completed",
            });

            const now = new Date();
            const oneDayAgo = new Date(now - 24 * 60 * 60 * 1000);

            const recentSuccess = runs.data.workflow_runs.find(
              (run) => run.conclusion === "success" && new Date(run.updated_at) > oneDayAgo,
            );

            const recentFailure = runs.data.workflow_runs.find(
              (run) => run.conclusion === "failure" && new Date(run.updated_at) > oneDayAgo,
            );

            let status = "healthy";
            let message = "";

            if (recentFailure && !recentSuccess) {
              status = "failing";
              message = `Recent workflow run failed: ${recentFailure.html_url}`;
            } else if (!recentSuccess && !recentFailure) {
              status = "silent";
              message = "No completed GetDayTrends run was recorded in the last 24 hours.";
              const lastRun = runs.data.workflow_runs[0];
              if (lastRun) {
                message += ` Last run: ${lastRun.updated_at} (${lastRun.conclusion}).`;
              }
            }

            core.setOutput("status", status);
            core.setOutput("message", message);
            core.setOutput(
              "total_runs_24h",
              runs.data.workflow_runs.filter((run) => new Date(run.updated_at) > oneDayAgo).length,
            );

      - name: Alert on heartbeat failure
        if: steps.check.outputs.status != 'healthy'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ steps.check.outputs.status }}"
          MSG="${{ steps.check.outputs.message }}"
          RUNS="${{ steps.check.outputs.total_runs_24h }}"

          if [ "$STATUS" = "silent" ]; then
            TITLE="Scheduler heartbeat missing"
          else
            TITLE="Scheduler heartbeat failing"
          fi

          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -s -H "Content-Type: application/json" \
              -d "{\"content\":\"${TITLE}\\n24h runs: ${RUNS}\\n${MSG}\"}" \
              "$DISCORD_WEBHOOK_URL" || true
          fi

          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"${TITLE}\n24h runs: ${RUNS}\n${MSG}\"}" || true
          fi

      - name: Heartbeat summary
        if: always()
        run: |
          STATUS="${{ steps.check.outputs.status }}"
          RUNS="${{ steps.check.outputs.total_runs_24h }}"

          cat <<EOF >> $GITHUB_STEP_SUMMARY
          ### Scheduler Heartbeat

          - Status: ${STATUS}
          - Runs in last 24h: ${RUNS}
          - Message: ${{ steps.check.outputs.message || 'healthy' }}
          EOF
