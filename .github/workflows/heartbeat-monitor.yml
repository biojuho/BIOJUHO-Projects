name: Scheduler Heartbeat Monitor

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  heartbeat-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - name: Check pipeline health
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const ONE_DAY = 24 * 60 * 60 * 1000;
            const oneDayAgo = new Date(Date.now() - ONE_DAY);

            async function checkWorkflow(workflowId, label) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowId,
                per_page: 6,
                status: "completed",
              });

              const recent = runs.data.workflow_runs.filter(
                (r) => new Date(r.updated_at) > oneDayAgo,
              );
              const success = recent.find((r) => r.conclusion === "success");
              const failure = recent.find((r) => r.conclusion === "failure");

              let status = "healthy";
              if (failure && !success) status = "failing";
              else if (!success && !failure) status = "silent";

              return { label, status, runs24h: recent.length, lastRun: runs.data.workflow_runs[0] };
            }

            const gdt = await checkWorkflow("getdaytrends.yml", "GetDayTrends");
            const dn = await checkWorkflow("dailynews-pipeline.yml", "DailyNews");

            const allHealthy = gdt.status === "healthy" && dn.status === "healthy";
            const results = [gdt, dn];

            let summary = results.map((r) => {
              const emoji = r.status === "healthy" ? "✅" : r.status === "failing" ? "🔴" : "⚠️";
              const last = r.lastRun ? `${r.lastRun.updated_at} (${r.lastRun.conclusion})` : "never";
              return `${emoji} ${r.label}: ${r.status} (${r.runs24h} runs/24h, last: ${last})`;
            }).join("\n");

            core.setOutput("all_healthy", allHealthy);
            core.setOutput("summary", summary);
            core.setOutput("gdt_status", gdt.status);
            core.setOutput("dn_status", dn.status);

      - name: Alert on heartbeat failure
        if: steps.check.outputs.all_healthy != 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SUMMARY="${{ steps.check.outputs.summary }}"

          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -s -H "Content-Type: application/json" \
              -d "{\"content\":\"⚠️ **Daily Heartbeat Alert**\n${SUMMARY}\"}" \
              "$DISCORD_WEBHOOK_URL" || true
          fi

          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"⚠️ Daily Heartbeat Alert\n${SUMMARY}\"}" || true
          fi

      - name: Heartbeat summary
        if: always()
        run: |
          cat <<EOF >> $GITHUB_STEP_SUMMARY
          ### 📊 Daily Scheduler Heartbeat

          | Pipeline | Status |
          |:---|:---|
          | GetDayTrends | ${{ steps.check.outputs.gdt_status }} |
          | DailyNews | ${{ steps.check.outputs.dn_status }} |

          **Details:**
          ${{ steps.check.outputs.summary }}
          EOF
