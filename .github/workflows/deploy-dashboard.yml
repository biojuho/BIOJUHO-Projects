name: Deploy Dashboard to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'apps/dashboard/**'
      - 'shared/**'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: ai-automation-dashboard
  REGION: asia-northeast3 # 서울

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js (for React frontend build)
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3.9.1
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/dashboard/package.json'

      - name: Build React Frontend
        working-directory: apps/dashboard
        run: |
          npm ci
          npm run build

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2.2.1

      - name: Authorize Docker push
        run: gcloud auth configure-docker --quiet

      - name: Build and Deploy to Cloud Run
        run: |
          # .gitignore excludes dist/ by default, which prevents Cloud Build from seeing it.
          # We create a .gcloudignore that includes .gitignore but un-ignores the dist dir.
          cp .gitignore .gcloudignore
          echo "!apps/dashboard/dist/" >> .gcloudignore
          
          gcloud builds submit --tag gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }} \
            --file apps/dashboard/Dockerfile .
            
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars="DASHBOARD_ALLOWED_ORIGINS=*,AGRIGUARD_DATABASE_URL=${{ secrets.SUPABASE_DATABASE_URL }},ENVIRONMENT=production"
