name: Deploy Dashboard to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'apps/dashboard/**'
      - 'shared/**'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: ai-automation-dashboard
  REGION: asia-northeast3 # 서울

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (for React frontend build)
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/dashboard/package.json'

      - name: Build React Frontend
        working-directory: apps/dashboard
        run: |
          npm ci
          npm run build

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker push
        run: gcloud auth configure-docker --quiet

      - name: Build and Deploy to Cloud Run
        run: |
          gcloud builds submit --tag gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }} \
            --file apps/dashboard/Dockerfile .
            
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars="DASHBOARD_ALLOWED_ORIGINS=*,DATABASE_URL=${{ secrets.SUPABASE_DATABASE_URL }},ENVIRONMENT=production"
