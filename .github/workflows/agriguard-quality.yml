
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

﻿name: AgriGuard Quality Gate

on:
  push:
    paths:
      - 'apps/AgriGuard/**'
  pull_request:
    paths:
      - 'apps/AgriGuard/**'

defaults:
  run:
    working-directory: apps/AgriGuard/frontend

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["24.15.0"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Bootstrap legacy paths
        working-directory: ${{ github.workspace }}
        run: python3 bootstrap_legacy_paths.py

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: apps/AgriGuard/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit Tests
        run: npm run test

      - name: Build (LTS)
        run: npm run build:lts

      - name: Bundle Budget Check
        run: npm run check:bundle
