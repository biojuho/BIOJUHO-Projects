
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

﻿name: AgriGuard Quality Gate

on:
  push:
    paths:
      - 'apps/AgriGuard/**'
  pull_request:
    paths:
      - 'apps/AgriGuard/**'

defaults:
  run:
    working-directory: apps/AgriGuard/frontend

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["24.15.0"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Bootstrap legacy paths
        working-directory: ${{ github.workspace }}
        run: python3 bootstrap_legacy_paths.py

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: apps/AgriGuard/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit Tests
        run: npm run test

      - name: Build (LTS)
        run: npm run build:lts

      - name: Bundle Budget Check
        run: npm run check:bundle
