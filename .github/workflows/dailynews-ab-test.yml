name: DailyNews A/B Test Runner

# 목적: DailyNews 프로젝트의 파이프라인 퀄리티 벤치마킹
# Audience-First 프레임워크 기준에 따라 (구체성, 실용성, 공감성 등)
# 주기적으로 A/B 테스트를 자동화하여 분석 데이터를 축적합니다.

on:
  schedule:
    # 매주 수요일, 토요일 10:00 UTC (KST 19:00 - 가장 뉴스 읽기 좋은 퇴근길 시간대 전 테스트)
    - cron: "0 10 * * 3,6"
  workflow_dispatch:
    inputs:
      force_run:
        description: "수동 강제 실행"
        required: false
        type: boolean
        default: true

jobs:
  run-ab-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          uv sync --package DailyNews
          uv pip install -e . --no-deps

      - name: Create output directory
        run: mkdir -p automation/DailyNews/output

      - name: Run A/B Test
        working-directory: automation/DailyNews
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run python scripts/ab_test_economy_kr_v2.py

      - name: Upload Test Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dailynews-ab-test-report-${{ github.run_number }}
          path: automation/DailyNews/output/ab_test_economy_kr_v2.*
          retention-days: 14

      - name: Print Report Summary
        if: success()
        run: |
          cat automation/DailyNews/output/ab_test_economy_kr_v2.md >> $GITHUB_STEP_SUMMARY

      - name: Telegram notification (Success)
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            # Extract the KPI Difference string from markdown report if available
            KPI_RESULT=$(grep "KPI Difference" automation/DailyNews/output/ab_test_economy_kr_v2.md | head -n 1 || echo "KPI Difference: Check Report")
            DECISION=$(grep "\*\*Decision\*\*" automation/DailyNews/output/ab_test_economy_kr_v2.md | head -n 1 || echo "Decision: Check Report")
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"[📊 DailyNews A/B Test]\\n테스트 완료 (#${{ github.run_number }})\\n\\n${KPI_RESULT}\\n${DECISION}\\n\\n🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true
          fi

      - name: Telegram notification (Failure)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"[❌ ERROR] DailyNews A/B Test #${{ github.run_number }} 실패\\n🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true
          fi
