name: desci-platform-quality

on:
  pull_request:
    paths:
      - "desci-platform/**"
      - ".github/workflows/desci-platform-quality.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "desci-platform/**"
      - ".github/workflows/desci-platform-quality.yml"
  workflow_dispatch:

jobs:
  backend-smoke:
    name: Backend Smoke (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desci-platform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "desci-platform/biolinker/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r biolinker/requirements.txt

      - name: Run smoke tests
        env:
          PYTHONUTF8: "1"
        run: python -m pytest biolinker/tests/test_smoke_pipeline.py -q

  frontend-quality:
    name: Frontend Lint + Build (Node LTS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desci-platform/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: "npm"
          cache-dependency-path: "desci-platform/frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Check bundle budget
        env:
          MAX_CHUNK_KB: "500"
          MAX_ENTRY_KB: "260"
        run: npm run check:bundle
