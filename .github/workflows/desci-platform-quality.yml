name: Workspace Quality

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "apps/desci-platform/**"
      - "apps/AgriGuard/**"
      - "apps/dashboard/**"
      - "automation/DailyNews/**"
      - "automation/getdaytrends/**"
      - "mcp/notebooklm-mcp/**"
      - "mcp/github-mcp/**"
      - "packages/shared/**"
      - "tests/**"
      - "ops/scripts/run_workspace_smoke.py"
      - "ops/scripts/workspace_paths.py"
      - "workspace-map.json"
      - "bootstrap_legacy_paths.py"
      - "docs/QUALITY_GATE.md"
      - ".github/workflows/desci-platform-quality.yml"
  push:
    branches: ["main", "master"]
    paths:
      - "apps/desci-platform/**"
      - "apps/AgriGuard/**"
      - "apps/dashboard/**"
      - "automation/DailyNews/**"
      - "automation/getdaytrends/**"
      - "mcp/notebooklm-mcp/**"
      - "mcp/github-mcp/**"
      - "packages/shared/**"
      - "tests/**"
      - "ops/scripts/run_workspace_smoke.py"
      - "ops/scripts/workspace_paths.py"
      - "workspace-map.json"
      - "bootstrap_legacy_paths.py"
      - "docs/QUALITY_GATE.md"
      - ".github/workflows/desci-platform-quality.yml"
  workflow_dispatch:

jobs:
  workspace-quality:
    name: Workspace Quality (${{ matrix.scope }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scope: [workspace, desci, agriguard, mcp, getdaytrends]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: '3.13'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: matrix.scope == 'workspace' || matrix.scope == 'desci' || matrix.scope == 'agriguard'
        with:
          node-version: "24.15.0"
          cache: npm
          cache-dependency-path: |
            apps/desci-platform/frontend/package-lock.json
            apps/AgriGuard/frontend/package-lock.json
            apps/dashboard/package-lock.json

      - name: Install Python dependencies
        run: uv sync --all-packages

      - name: Install dependencies (workspace/desci/agriguard)
        if: matrix.scope == 'workspace'
        run: |
          npm ci --prefix apps/desci-platform/frontend
          npm ci --prefix apps/AgriGuard/frontend
          npm ci --prefix apps/dashboard

      - name: Install dependencies (desci npm)
        if: matrix.scope == 'desci'
        run: npm ci --prefix apps/desci-platform/frontend

      - name: Build frontend (desci)
        if: matrix.scope == 'desci'
        run: npm run build --prefix apps/desci-platform/frontend

      - name: Install dependencies (agriguard npm)
        if: matrix.scope == 'agriguard'
        run: npm ci --prefix apps/AgriGuard/frontend

      - name: Run workspace smoke
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
          MATRIX_SCOPE: ${{ matrix.scope }}
        run: uv run python ops/scripts/run_workspace_smoke.py --scope "$MATRIX_SCOPE" --json-out "smoke-${MATRIX_SCOPE}.json"

      - name: Append summary
        if: always()
        env:
          MATRIX_SCOPE: ${{ matrix.scope }}
        run: |
          uv run python - <<'PY'
          import json
          import os
          from pathlib import Path

          scope = os.environ["MATRIX_SCOPE"]
          report_path = Path(f"smoke-{scope}.json")
          if not report_path.exists():
              print(f"::warning::Missing smoke report for {scope}")
              raise SystemExit(0)

          results = json.loads(report_path.read_text(encoding="utf-8"))
          total = len(results)
          passed = sum(1 for item in results if item.get("ok"))
          failed = total - passed

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary_path.open("a", encoding="utf-8") as summary:
              summary.write(f"### {scope} scope\n")
              summary.write(f"- Passed: {passed}\n")
              summary.write(f"- Failed: {failed}\n")
              summary.write(f"- Total: {total}\n\n")
          PY

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: workspace-smoke-${{ matrix.scope }}
          path: smoke-${{ matrix.scope }}.json
          if-no-files-found: warn
