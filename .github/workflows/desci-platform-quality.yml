name: workspace-quality

on:
  pull_request:
    paths:
      - "desci-platform/**"
      - "AgriGuard/**"
      - "MCP_notion-antigravity/**"
      - "notebooklm-mcp/**"
      - "github-mcp/**"
      - "tests/**"
      - "scripts/run_workspace_smoke.py"
      - "QUALITY_GATE.md"
      - ".github/workflows/desci-platform-quality.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "desci-platform/**"
      - "AgriGuard/**"
      - "MCP_notion-antigravity/**"
      - "notebooklm-mcp/**"
      - "github-mcp/**"
      - "tests/**"
      - "scripts/run_workspace_smoke.py"
      - "QUALITY_GATE.md"
      - ".github/workflows/desci-platform-quality.yml"
  workflow_dispatch:

jobs:
  workspace-quality:
    name: Workspace Quality (${{ matrix.scope }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scope:
          - workspace
          - desci
          - agriguard
          - mcp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            desci-platform/biolinker/requirements.txt
            MCP_notion-antigravity/requirements.txt

      - name: Set up Node.js
        if: matrix.scope == 'desci' || matrix.scope == 'agriguard'
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: "npm"
          cache-dependency-path: |
            desci-platform/frontend/package-lock.json
            AgriGuard/frontend/package-lock.json

      - name: Install dependencies (workspace)
        if: matrix.scope == 'workspace'
        run: |
          python -m pip install --upgrade pip
          pip install -r desci-platform/biolinker/requirements.txt
          pip install -r MCP_notion-antigravity/requirements.txt

      - name: Install dependencies (desci)
        if: matrix.scope == 'desci'
        run: |
          python -m pip install --upgrade pip
          pip install -r desci-platform/biolinker/requirements.txt
          npm ci --prefix desci-platform/frontend

      - name: Install dependencies (agriguard)
        if: matrix.scope == 'agriguard'
        run: npm ci --prefix AgriGuard/frontend

      - name: Install dependencies (mcp)
        if: matrix.scope == 'mcp'
        run: |
          python -m pip install --upgrade pip
          pip install -r MCP_notion-antigravity/requirements.txt

      - name: Run workspace smoke
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: python scripts/run_workspace_smoke.py --scope "${{ matrix.scope }}" --json-out "smoke-${{ matrix.scope }}.json"

      - name: Append summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          scope = "${{ matrix.scope }}"
          report_path = Path(f"smoke-{scope}.json")
          if not report_path.exists():
              print(f"::warning::Missing smoke report for {scope}")
              raise SystemExit(0)

          results = json.loads(report_path.read_text(encoding="utf-8"))
          total = len(results)
          passed = sum(1 for item in results if item.get("ok"))
          failed = total - passed

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary_path.open("a", encoding="utf-8") as summary:
              summary.write(f"### {scope} scope\n")
              summary.write(f"- Passed: {passed}\n")
              summary.write(f"- Failed: {failed}\n")
              summary.write(f"- Total: {total}\n\n")
          PY

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workspace-smoke-${{ matrix.scope }}
          path: smoke-${{ matrix.scope }}.json
          if-no-files-found: warn
