name: GetDayTrends Tests

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "automation/getdaytrends/**"
      - "packages/shared/**"
      - "getdaytrends/**"
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "automation/getdaytrends/**"
      - "packages/shared/**"
      - "getdaytrends/**"
  workflow_dispatch: {}

concurrency:
  group: gdt-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"
      # Stub values so env_loader doesn't warn during tests
      ANTHROPIC_API_KEY: "test-stub"
      GOOGLE_API_KEY:    "test-stub"
      OPENAI_API_KEY:    "test-stub"

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          uv sync --package getdaytrends
          uv pip install -e . --no-deps

      # ── Shared package tests ──
      - name: Run shared tests
        run: |
          mkdir -p test-results
          uv run python -m pytest packages/shared/tests/ -v --tb=short \
            --junitxml=test-results/shared.xml \
            -q --no-header

      # ── GetDayTrends automation tests ──
      - name: Run getdaytrends tests
        run: |
          uv run python -m pytest automation/getdaytrends/tests/ -v --tb=short \
            --junitxml=test-results/getdaytrends.xml \
            -q --no-header

      # ── Summary report ──
      - name: Test summary
        if: always()
        run: |
          uv run python - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          summary_path = Path(os.environ.get("GITHUB_STEP_SUMMARY", "/tmp/summary.md"))
          lines = ["## 🧪 Test Results\n\n| Suite | Passed | Failed | Errors |\n|:---|:---:|:---:|:---:|"]

          total_pass = total_fail = total_err = 0
          for xml_file in sorted(Path("test-results").glob("*.xml")):
              try:
                  root = ET.parse(xml_file).getroot()
                  tests  = int(root.attrib.get("tests",    0))
                  fails  = int(root.attrib.get("failures", 0))
                  errs   = int(root.attrib.get("errors",   0))
                  passed = tests - fails - errs
                  total_pass += passed; total_fail += fails; total_err += errs
                  emoji = "✅" if fails + errs == 0 else "❌"
                  lines.append(f"| {emoji} {xml_file.stem} | {passed} | {fails} | {errs} |")
              except Exception as e:
                  lines.append(f"| ⚠️ {xml_file.stem} | - | - | parse error |")

          grand_ok = total_fail + total_err == 0
          lines.append(f"\n**Total: {total_pass} passed, {total_fail} failed, {total_err} errors**")
          lines.append(f"\n{'🟢 All suites green' if grand_ok else '🔴 Some tests failed'}")

          with summary_path.open("a", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")
          PY

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore
