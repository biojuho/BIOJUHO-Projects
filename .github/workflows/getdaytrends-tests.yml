name: GetDayTrends Tests

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "getdaytrends/**"
      - "shared/**"
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "getdaytrends/**"
      - "shared/**"

concurrency:
  group: gdt-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 🧪 GetDayTrends Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: getdaytrends/requirements.txt

      - name: Install dependencies
        run: pip install -r getdaytrends/requirements.txt

      - name: Run tests
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          python -m pytest getdaytrends/tests/ -v --tb=short \
            --junitxml=test-results/getdaytrends.xml

      - name: Test Summary
        if: always()
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          import os

          try:
              tree = ET.parse("test-results/getdaytrends.xml")
              root = tree.getroot()
              tests = int(root.attrib.get("tests", 0))
              failures = int(root.attrib.get("failures", 0))
              errors = int(root.attrib.get("errors", 0))
              passed = tests - failures - errors

              summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
              with open(summary_path, "a") as f:
                  emoji = "✅" if failures + errors == 0 else "❌"
                  f.write(f"### {emoji} GetDayTrends: {passed}/{tests} passed\n")
                  if failures + errors > 0:
                      f.write(f"- ❌ Failures: {failures}, Errors: {errors}\n")
          except Exception as e:
              print(f"Summary generation failed: {e}")
          PY

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: getdaytrends-test-results
          path: test-results/
          retention-days: 14
