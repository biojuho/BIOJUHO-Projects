name: GetDayTrends Tests

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "automation/getdaytrends/**"
      - "packages/shared/**"
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "automation/getdaytrends/**"
      - "packages/shared/**"

concurrency:
  group: gdt-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run tests
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          mkdir -p test-results
          uv run python -m pytest automation/getdaytrends/tests/ -v --tb=short \
            --junitxml=test-results/getdaytrends.xml

      - name: Test summary
        if: always()
        run: |
          uv run python - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report = Path("test-results/getdaytrends.xml")
          if not report.exists():
              raise SystemExit(0)

          root = ET.parse(report).getroot()
          tests = int(root.attrib.get("tests", 0))
          failures = int(root.attrib.get("failures", 0))
          errors = int(root.attrib.get("errors", 0))
          passed = tests - failures - errors

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          label = "PASS" if failures + errors == 0 else "FAIL"
          with summary_path.open("a", encoding="utf-8") as handle:
              handle.write(f"### {label} GetDayTrends: {passed}/{tests} passed\n")
              if failures + errors > 0:
                  handle.write(f"- Failures: {failures}, Errors: {errors}\n")
          PY

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: getdaytrends-test-results
          path: test-results/
          retention-days: 14
