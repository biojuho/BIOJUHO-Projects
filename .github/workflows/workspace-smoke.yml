name: Workspace Smoke Test

permissions:
  contents: read

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

concurrency:
  group: workspace-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Workspace smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: false
          persist-credentials: false

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: '3.13'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.15.0"

      - name: Install Python dependencies
        run: |
          uv sync --all-packages

      - name: Install Node dependencies
        run: |
          npm ci --prefix apps/desci-platform/frontend
          npm ci --prefix apps/AgriGuard/frontend
          npm ci --prefix apps/dashboard
          # Contracts dirs are exercised by the smoke suite's hardhat
          # compile/test steps below; their CLIs live in their own
          # node_modules, so they need a dedicated install.
          npm ci --prefix apps/desci-platform/contracts
          npm ci --prefix apps/AgriGuard/contracts

      - name: Run workspace smoke suite
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          uv run pytest tests/test_workspace_regressions.py tests/test_workspace_smoke.py -q --tb=short
          uv run python ops/scripts/run_workspace_smoke.py --scope all --json-out smoke-all.json

      - name: Append summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = Path("smoke-all.json")
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])

          if not report.exists():
              summary_path.write_text("## Workspace smoke\n\nSmoke report was not generated.\n", encoding="utf-8")
              raise SystemExit(0)

          results = json.loads(report.read_text(encoding="utf-8"))
          total = len(results)
          passed = sum(1 for item in results if item.get("ok"))
          failed = total - passed

          lines = [
              "## Workspace smoke",
              "",
              f"- Passed: {passed}",
              f"- Failed: {failed}",
              f"- Total: {total}",
          ]
          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: workspace-smoke-report
          path: smoke-all.json
          if-no-files-found: warn
