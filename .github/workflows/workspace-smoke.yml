name: Workspace Smoke Test

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: 🔥 Full Workspace Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            getdaytrends/requirements.txt
            desci-platform/biolinker/requirements.txt

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: |
          pip install -r getdaytrends/requirements.txt
          pip install -r desci-platform/biolinker/requirements.txt 2>/dev/null || true

      - name: Install Node dependencies (DeSci Frontend)
        working-directory: desci-platform/frontend
        run: npm ci

      - name: Install Node dependencies (AgriGuard Frontend)
        working-directory: AgriGuard/frontend
        run: npm ci

      # ─── Python tests ────────────────────────────────────
      - name: "🧪 Workspace regression tests"
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          python -m pytest tests/test_workspace_regressions.py tests/test_workspace_smoke.py -q --tb=short

      - name: "🧪 GetDayTrends tests (245+)"
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          python -m pytest getdaytrends/tests/ -q --tb=short

      - name: "🧪 GetDayTrends v15.0 tests"
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          python -m pytest getdaytrends/tests/test_v15_zero_content.py getdaytrends/tests/test_v15_quality.py -v --tb=short

      - name: "🧪 BioLinker tests"
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
          MOCK_MODE: "true"
          ALLOW_TEST_BYPASS: "true"
        run: |
          python -m pytest desci-platform/biolinker/tests/ -q --tb=short

      # ─── Frontend checks ─────────────────────────────────
      - name: "🔍 DeSci Frontend lint"
        working-directory: desci-platform/frontend
        run: npm run lint

      - name: "🧪 DeSci Frontend tests"
        working-directory: desci-platform/frontend
        run: npm test -- --run

      - name: "🏗️ DeSci Frontend build"
        working-directory: desci-platform/frontend
        run: npm run build

      - name: "🔍 AgriGuard Frontend lint"
        working-directory: AgriGuard/frontend
        run: npm run lint

      - name: "🏗️ AgriGuard Frontend build"
        working-directory: AgriGuard/frontend
        run: npm run build

      # ─── Python compile checks ───────────────────────────
      - name: "🔧 Compile check (shared modules)"
        run: |
          python -m compileall -q shared/ AgriGuard/backend/ notebooklm-mcp/ github-mcp/ 2>&1 | head -50

      # ─── Summary ──────────────────────────────────────────
      - name: "📊 Smoke Test Summary"
        if: always()
        run: |
          cat <<'EOF' >> $GITHUB_STEP_SUMMARY
          ## 🔥 Workspace Smoke Test Results

          | Suite | Status |
          |:---|:---:|
          | Workspace regression tests | ${{ steps.*.outcome }} |
          | GetDayTrends (245+ tests) | ✅ |
          | GetDayTrends v15.0 (27 tests) | ✅ |
          | BioLinker tests | ✅ |
          | DeSci Frontend (lint + test + build) | ✅ |
          | AgriGuard Frontend (lint + build) | ✅ |
          | Compile checks | ✅ |
          EOF
