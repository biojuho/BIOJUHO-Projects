name: Workspace Smoke Test

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

concurrency:
  group: workspace-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: |
          uv sync --all-packages

      - name: Install Node dependencies
        run: |
          npm ci --prefix apps/desci-platform/frontend
          npm ci --prefix apps/AgriGuard/frontend
          npm ci --prefix apps/dashboard

      - name: Run workspace smoke suite
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          uv run pytest tests/test_workspace_regressions.py tests/test_workspace_smoke.py -q --tb=short
          uv run python ops/scripts/run_workspace_smoke.py --scope all --json-out smoke-all.json

      - name: Append summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = Path("smoke-all.json")
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])

          if not report.exists():
              summary_path.write_text("## Workspace smoke\n\nSmoke report was not generated.\n", encoding="utf-8")
              raise SystemExit(0)

          results = json.loads(report.read_text(encoding="utf-8"))
          total = len(results)
          passed = sum(1 for item in results if item.get("ok"))
          failed = total - passed

          lines = [
              "## Workspace smoke",
              "",
              f"- Passed: {passed}",
              f"- Failed: {failed}",
              f"- Total: {total}",
          ]
          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workspace-smoke-report
          path: smoke-all.json
          if-no-files-found: warn
