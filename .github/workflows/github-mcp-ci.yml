name: GitHub MCP CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "mcp/github-mcp/**"
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "mcp/github-mcp/**"

jobs:
  script-tests:
    name: Python Script Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp/github-mcp

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          uv pip install --system pytest requests python-dotenv

      - name: Syntax check all Python scripts
        run: uv run python -m py_compile scripts/create_repo.py scripts/fetch_info.py

      - name: Run tests
        env:
          PYTHONIOENCODING: utf-8
        run: |
          if [ -d tests ] && compgen -G "tests/*.py" > /dev/null; then
            uv run pytest tests/ -v --tb=short
          else
            echo "::warning::github-mcp has no Python tests yet"
          fi

  package-check:
    name: Node Package Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp/github-mcp

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.15.0"

      - name: Validate package.json
        run: node -e "const p = require('./package.json'); console.log('Package:', p.name, p.version)"
