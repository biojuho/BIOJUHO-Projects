name: GitHub MCP CI

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "mcp/github-mcp/**"
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "mcp/github-mcp/**"

jobs:
  script-tests:
    name: Python Script Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp/github-mcp

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests python-dotenv

      - name: Syntax check all Python scripts
        run: python -m py_compile scripts/create_repo.py scripts/fetch_info.py

      - name: Run tests
        env:
          PYTHONIOENCODING: utf-8
        run: |
          if [ -d tests ] && compgen -G "tests/*.py" > /dev/null; then
            pytest tests/ -v --tb=short
          else
            echo "::warning::github-mcp has no Python tests yet"
          fi

  package-check:
    name: Node Package Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp/github-mcp

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate package.json
        run: node -e "const p = require('./package.json'); console.log('Package:', p.name, p.version)"
