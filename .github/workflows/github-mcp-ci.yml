name: GitHub MCP CI

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "mcp/github-mcp/**"
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "mcp/github-mcp/**"

jobs:
  script-tests:
    name: Python Script Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp/github-mcp

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          uv pip install --system pytest requests python-dotenv

      - name: Syntax check all Python scripts
        run: uv run python -m py_compile scripts/create_repo.py scripts/fetch_info.py

      - name: Run tests
        env:
          PYTHONIOENCODING: utf-8
        run: |
          if [ -d tests ] && compgen -G "tests/*.py" > /dev/null; then
            uv run pytest tests/ -v --tb=short
          else
            echo "::warning::github-mcp has no Python tests yet"
          fi

  package-check:
    name: Node Package Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp/github-mcp

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Validate package.json
        run: node -e "const p = require('./package.json'); console.log('Package:', p.name, p.version)"
