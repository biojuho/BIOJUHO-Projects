name: getdaytrends - Auto Tweet Generator

on:
  schedule:
    # UTC 기준 4시간마다 실행 (KST 01:00, 05:00, 09:00, 13:00, 17:00, 21:00)
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      country:
        description: '국가 코드 (korea, us, japan, global)'
        required: false
        default: 'korea'
      limit:
        description: '처리할 트렌드 수'
        required: false
        default: '5'
      dry_run:
        description: 'Dry-run 모드 (외부 저장 안 함)'
        required: false
        type: boolean
        default: false

jobs:
  generate-tweets:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'getdaytrends/requirements.txt'

      - name: Install dependencies
        run: pip install -r getdaytrends/requirements.txt

      - name: Create .env file
        working-directory: getdaytrends
        run: |
          cat <<EOF > .env
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY || secrets.GOOGLE_API_KEY }}
          STORAGE_TYPE=${{ secrets.STORAGE_TYPE || 'notion' }}
          NOTION_TOKEN=${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID=${{ secrets.NOTION_DATABASE_ID }}
          GOOGLE_SERVICE_JSON=${{ secrets.GOOGLE_SERVICE_JSON || '' }}
          GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID || '' }}
          TWITTER_BEARER_TOKEN=${{ secrets.TWITTER_BEARER_TOKEN || '' }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN || '' }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID || '' }}
          DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL || '' }}
          FIRECRAWL_API_KEY=${{ secrets.FIRECRAWL_API_KEY || '' }}
          DEFAULT_COUNTRY=${{ github.event.inputs.country || 'korea' }}
          DEFAULT_LIMIT=${{ github.event.inputs.limit || '5' }}
          SCHEDULE_INTERVAL_MINUTES=240
          EOF

      - name: Create data directory
        run: mkdir -p getdaytrends/data

      - name: Run getdaytrends
        working-directory: getdaytrends
        run: |
          FLAGS="--one-shot --verbose"
          if [ "${{ github.event.inputs.country }}" != "" ]; then
            FLAGS="$FLAGS --country ${{ github.event.inputs.country }}"
          fi
          if [ "${{ github.event.inputs.limit }}" != "" ]; then
            FLAGS="$FLAGS --limit ${{ github.event.inputs.limit }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          python main.py $FLAGS

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tweet-bot-log-${{ github.run_number }}
          path: getdaytrends/tweet_bot.log
          retention-days: 7

      - name: "🔔 Discord notification (failure)"
        if: failure() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\":\"❌ **GetDayTrends 실행 실패** (#${{ github.run_number }})\\n🔗 [로그 확인](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"}" \
            "$DISCORD_WEBHOOK_URL" || true

      - name: "📱 Telegram notification (failure)"
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"[ERROR] GetDayTrends #${{ github.run_number }} FAILED\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"parse_mode\":\"Markdown\"}" || true
          fi

      - name: "💚 Heartbeat ping (success)"
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "GetDayTrends run #${{ github.run_number }} completed successfully at $(date -u +%FT%TZ)"
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"[OK] GetDayTrends #${{ github.run_number }} completed\"}" || true
          fi
