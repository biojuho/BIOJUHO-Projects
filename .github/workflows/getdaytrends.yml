name: GetDayTrends Pipeline

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      country:
        description: "Country code (korea, us, japan, global)"
        required: false
        default: "korea"
      limit:
        description: "Maximum trends to process"
        required: false
        default: "5"
      dry_run:
        description: "Skip publish side effects"
        required: false
        type: boolean
        default: false

jobs:
  generate-tweets:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Create .env file
        working-directory: automation/getdaytrends
        run: |
          cat <<EOF > .env
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY || secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          XAI_API_KEY=${{ secrets.XAI_API_KEY }}
          STORAGE_TYPE=${{ secrets.STORAGE_TYPE || 'notion' }}
          NOTION_TOKEN=${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID=${{ secrets.NOTION_DATABASE_ID }}
          GOOGLE_SERVICE_JSON=${{ secrets.GOOGLE_SERVICE_JSON || '' }}
          GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID || '' }}
          TWITTER_BEARER_TOKEN=${{ secrets.TWITTER_BEARER_TOKEN || '' }}
          X_ACCESS_TOKEN=${{ secrets.X_ACCESS_TOKEN || '' }}
          X_CLIENT_ID=${{ secrets.X_CLIENT_ID || '' }}
          X_CLIENT_SECRET=${{ secrets.X_CLIENT_SECRET || '' }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN || '' }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID || '' }}
          DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL || '' }}
          FIRECRAWL_API_KEY=${{ secrets.FIRECRAWL_API_KEY || '' }}
          DATABASE_URL=${{ secrets.DATABASE_URL || '' }}
          DEFAULT_COUNTRY=${{ github.event.inputs.country || 'korea' }}
          DEFAULT_LIMIT=${{ github.event.inputs.limit || '5' }}
          SCHEDULE_INTERVAL_MINUTES=240
          ENABLE_PARALLEL_COUNTRIES=true
          EOF

      - name: Create data directory
        run: mkdir -p automation/getdaytrends/data

      - name: Run getdaytrends
        working-directory: automation/getdaytrends
        run: |
          FLAGS="--one-shot --verbose"
          if [ "${{ github.event.inputs.country }}" != "" ]; then
            FLAGS="$FLAGS --country ${{ github.event.inputs.country }}"
          fi
          if [ "${{ github.event.inputs.limit }}" != "" ]; then
            FLAGS="$FLAGS --limit ${{ github.event.inputs.limit }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          uv run python main.py $FLAGS

      - name: Cleanup .env
        if: always()
        working-directory: automation/getdaytrends
        run: rm -f .env

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: getdaytrends-log-${{ github.run_number }}
          path: automation/getdaytrends/tweet_bot.log
          retention-days: 7

      - name: Discord notification on failure
        if: failure() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\":\"🔴 GetDayTrends #${{ github.run_number }} failed\\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$DISCORD_WEBHOOK_URL" || true

      - name: Telegram notification on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"🔴 GetDayTrends #${{ github.run_number }} failed\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true
          fi

      - name: Telegram heartbeat on success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "GetDayTrends run #${{ github.run_number }} completed successfully at $(date -u +%FT%TZ)"
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"✅ GetDayTrends #${{ github.run_number }} completed at $(date -u +%FT%TZ)\nCountry: ${{ github.event.inputs.country || 'korea' }}\"}" || true
          fi
