name: Collect Tweet Metrics

# 목적: GetDayTrends에서 게시한 트윗의 실제 engagement 데이터를 수집
# 회의 Action Item #3: A/B 테스트 measured label 확보

on:
  schedule:
    # 매일 00:00 UTC (09:00 KST) — 전일 게시물의 24시간 성과 수집
    - cron: "0 0 * * *"
    # 매일 12:00 UTC (21:00 KST) — 당일 게시물의 12시간 중간 성과 수집
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: "Lookback window in hours"
        required: false
        default: "72"

jobs:
  collect-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: automation/getdaytrends/requirements.txt

      - name: Install dependencies
        run: pip install -r automation/getdaytrends/requirements.txt

      - name: Create data directory
        run: mkdir -p automation/getdaytrends/data

      - name: Collect tweet metrics
        working-directory: automation/getdaytrends
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          LOOKBACK="${{ github.event.inputs.lookback_hours || '72' }}"
          python scripts/collect_posted_tweet_metrics.py \
            --lookback-hours "$LOOKBACK" \
            --require-token \
            --json-out data/tweet_metrics_$(date -u +%Y%m%d_%H%M%S).json

      - name: Upload metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tweet-metrics-${{ github.run_number }}
          path: automation/getdaytrends/data/tweet_metrics_*.json
          retention-days: 30

      - name: Summary
        if: success()
        run: |
          echo "### Tweet Metrics Collection ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Lookback: ${{ github.event.inputs.lookback_hours || '72' }} hours" >> $GITHUB_STEP_SUMMARY
          echo "- Run: #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY

      - name: Telegram notification on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"[ERROR] Tweet Metrics Collection #${{ github.run_number }} failed\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true
          fi
