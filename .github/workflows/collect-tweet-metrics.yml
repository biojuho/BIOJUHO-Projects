name: Collect Tweet Metrics

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# 목적: GetDayTrends에서 게시한 트윗의 실제 engagement 데이터를 수집
# 회의 Action Item #3: A/B 테스트 measured label 확보

on:
  schedule:
    # 매일 00:00 UTC (09:00 KST) — 전일 게시물의 24시간 성과 수집
    - cron: "0 0 * * *"
    # 매일 12:00 UTC (21:00 KST) — 당일 게시물의 12시간 중간 성과 수집
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: "Lookback window in hours"
        required: false
        default: "72"

jobs:
  collect-metrics:
    environment: automation-ops
    name: Collect tweet metrics
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          uv sync --package getdaytrends
          uv pip install -e . --no-deps

      - name: Create data directory
        run: mkdir -p automation/getdaytrends/data

      - name: Collect tweet metrics
        working-directory: automation/getdaytrends
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '72' }}
        run: |
          LOOKBACK="$LOOKBACK_HOURS"
          uv run python scripts/collect_posted_tweet_metrics.py \
            --lookback-hours "$LOOKBACK" \
            --require-token \
            --json-out data/tweet_metrics_$(date -u +%Y%m%d_%H%M%S).json

      - name: Upload metrics artifact
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: tweet-metrics-${{ github.run_id }}
          path: automation/getdaytrends/data/tweet_metrics_*.json
          retention-days: 30

      - name: Summary
        if: success()
        env:
          LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '72' }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          echo "### Tweet Metrics Collection" >> "$GITHUB_STEP_SUMMARY"
          echo "- Lookback: $LOOKBACK_HOURS hours" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run: #${GITHUB_RUN_NUMBER}" >> "$GITHUB_STEP_SUMMARY"

      - name: Telegram notification on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"[ERROR] Tweet Metrics Collection #${GITHUB_RUN_NUMBER} failed\n${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" || true
          fi
