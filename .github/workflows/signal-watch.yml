name: Signal Watch Pipeline

on:
  schedule:
    # Run every 3 hours
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      auto_draft:
        description: "Enable auto draft for highly actionable signals"
        type: boolean
        required: false
        default: true
      threshold:
        description: "Composite score threshold"
        type: number
        required: false
        default: 0.6

jobs:
  run-signal-watch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Create .env file
        working-directory: automation/DailyNews
        run: |
          cat <<EOF > .env
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY || secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          NOTION_API_KEY=${{ secrets.NOTION_API_KEY || secrets.NOTION_TOKEN || '' }}
          NOTION_TASKS_DATABASE_ID=${{ secrets.NOTION_TASKS_DATABASE_ID || secrets.ANTIGRAVITY_TASKS_DB_ID || secrets.ANTIGRAVITY_DB_ID || '' }}
          NOTION_REPORTS_DATABASE_ID=${{ secrets.NOTION_REPORTS_DATABASE_ID || secrets.ANTIGRAVITY_NEWS_DB_ID || secrets.NOTION_DATABASE_ID || '' }}
          NOTION_DASHBOARD_PAGE_ID=${{ secrets.NOTION_DASHBOARD_PAGE_ID || secrets.DASHBOARD_PAGE_ID || '' }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN || '' }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID || '' }}
          DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL || '' }}
          TARGET_PLATFORMS=x,threads,naver_blog
          EOF

      - name: Run Signal Watch
        working-directory: automation/DailyNews
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          AUTO_DRAFT_FLAG=""
          if [ "${{ github.event_name }}" == "schedule" ]; then
            AUTO_DRAFT_FLAG="--auto-draft"
            THRESHOLD="0.6"
          else
            if [ "${{ github.event.inputs.auto_draft }}" == "true" ]; then AUTO_DRAFT_FLAG="--auto-draft"; fi
            THRESHOLD="${{ github.event.inputs.threshold || '0.6' }}"
          fi
          uv run python -m antigravity_mcp.cli signal watch --threshold $THRESHOLD $AUTO_DRAFT_FLAG 2>&1

      - name: Cleanup .env
        if: always()
        working-directory: automation/DailyNews
        run: rm -f .env

      - name: Telegram notification on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"🔴 Signal Watch #${{ github.run_number }} failed\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true
          fi
