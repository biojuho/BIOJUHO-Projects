name: Canva MCP CI

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "canva-mcp/**"
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "canva-mcp/**"

jobs:
  typecheck-and-build:
    name: TypeScript Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: canva-mcp

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: canva-mcp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Build server
        run: npm run build:server
