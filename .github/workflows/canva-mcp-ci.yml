name: Canva MCP CI

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "mcp/canva-mcp/**"
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "mcp/canva-mcp/**"

jobs:
  typecheck-and-build:
    name: TypeScript Check and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp/canva-mcp

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: mcp/canva-mcp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Build server
        run: npm run build:server
