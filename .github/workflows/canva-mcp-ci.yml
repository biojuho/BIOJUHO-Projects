name: Canva MCP CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "mcp/canva-mcp/**"
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "mcp/canva-mcp/**"

jobs:
  typecheck-and-build:
    name: TypeScript Check and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp/canva-mcp

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Bootstrap legacy paths
        run: python3 bootstrap_legacy_paths.py

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.15.0"
          cache: "npm"
          cache-dependency-path: mcp/canva-mcp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Build server
        run: npm run build:server
