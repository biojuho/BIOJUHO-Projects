version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "biojuho"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
    labels:
      - "dependencies"
      - "javascript"

  - package-ecosystem: "pip"
    directory: "/automation/DailyNews"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
    labels:
      - "dependencies"
      - "python"
      - "dailynews"

  - package-ecosystem: "pip"
    directory: "/automation/getdaytrends"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:45"
    labels:
      - "dependencies"
      - "python"
      - "getdaytrends"

  - package-ecosystem: "pip"
    directory: "/apps/AgriGuard/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
    labels:
      - "dependencies"
      - "python"
      - "agriguard"

  - package-ecosystem: "npm"
    directory: "/apps/AgriGuard/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:15"
    labels:
      - "dependencies"
      - "javascript"
      - "agriguard"

  - package-ecosystem: "pip"
    directory: "/apps/desci-platform/biolinker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:30"
    labels:
      - "dependencies"
      - "python"
      - "biolinker"

  - package-ecosystem: "npm"
    directory: "/apps/desci-platform/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:45"
    open-pull-requests-limit: 10
    reviewers:
      - "biojuho"
    labels:
      - "dependencies"
      - "javascript"
      - "frontend"
    versioning-strategy: increase
    commit-message:
      prefix: "chore"
      prefix-development: "chore(dev)"

  - package-ecosystem: "npm"
    directory: "/apps/desci-platform/contracts"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "11:00"
    labels:
      - "dependencies"
      - "javascript"
      - "contracts"

  - package-ecosystem: "npm"
    directory: "/apps/dashboard"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "11:15"
    labels:
      - "dependencies"
      - "javascript"
      - "dashboard"

  - package-ecosystem: "npm"
    directory: "/mcp/canva-mcp"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "11:30"
    labels:
      - "dependencies"
      - "javascript"
      - "mcp"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "12:00"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
