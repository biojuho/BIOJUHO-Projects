name: 'Setup Python and UV'
description: 'Sets up Python and installs astral-sh/setup-uv with caching enabled'
inputs:
  python-version:
    description: 'Python version to install'
    required: false
    default: '3.13'
  uv-version:
    description: 'UV version to install'
    required: false
    default: 'latest'
  enable-cache:
    description: 'Enable UV package caching'
    required: false
    default: 'true'

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: ${{ inputs.uv-version }}
        enable-cache: ${{ inputs.enable-cache }}

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
